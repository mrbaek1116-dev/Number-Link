<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Personal Rack</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; }
        button { padding: 10px 15px; font-size: 13px; background: #2c3e50; color: white; border: 1px solid #34495e; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-complete { background: #27ae60; border-color: #2ecc71; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: 내 거치대 시스템</h3>
    <p id="msg" style="margin:5px; font-size:12px; color:#aaa;">타일을 거치대 위에 정렬하세요.</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋</button>
    <button onclick="drawOneTile()" style="background:#8e44ad;">타일 뽑기</button>
    <button onclick="sortHand()">정렬</button>
    <button class="btn-complete" onclick="submitRegistration()">조합 등록</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;
    let hasRegistered30 = false;

    const TILE_W = 46, TILE_H = 60;
    const GRID_X = 56, GRID_Y = 75;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    
    let rackY; // 거치대 시작 높이

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        rackY = canvas.height - 320; // 거치대를 화면 하단에서 320px 위로 배치 (클릭 방해 방지)
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = []; pool = []; hasRegistered30 = false;
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 0, color: 'color', joker: 'color' }, { num: 0, color: 'bw', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 14; i++) drawOneTile(true);
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        const idx = tiles.length;
        const cols = Math.floor((canvas.width - 40) / GRID_X);
        t.x = 20 + (idx % cols) * GRID_X;
        t.y = rackY + 20 + Math.floor(idx / cols) * GRID_Y;
        tiles.push(t);
        if(!isInit) render();
    }

    function sortHand() {
        tiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        const cols = Math.floor((canvas.width - 40) / GRID_X);
        tiles.forEach((t, i) => {
            t.x = 20 + (i % cols) * GRID_X;
            t.y = rackY + 20 + Math.floor(i / cols) * GRID_Y;
        });
        render();
    }

    function submitRegistration() {
        const groups = findGroups();
        if (groups.length === 0) {
            alert("조합이 맞지 않거나 3장 이상 붙여주세요.");
            return;
        }

        let totalScore = 0;
        groups.forEach(g => g.forEach(t => totalScore += (t.joker ? 0 : t.num)));

        if (!hasRegistered30 && totalScore < 30) {
            alert("첫 조합은 30점 이상이어야 합니다.");
            return;
        }

        hasRegistered30 = true;
        // 등록된 타일은 일단 화면에서 제거 (추후 바닥 보드 구현 시 이동)
        let registeredIds = new Set();
        groups.forEach(g => g.forEach(t => registeredIds.add(t)));
        tiles = tiles.filter(t => !registeredIds.has(t));
        
        alert("등록 성공!");
        render();
    }

    function findGroups() {
        const foundGroups = []; const visited = new Set();
        const sorted = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);
        for (let i = 0; i < sorted.length; i++) {
            if (visited.has(i)) continue;
            let group = [sorted[i]]; visited.add(i);
            let curr = sorted[i]; let next = true;
            while (next) {
                next = false;
                for (let j = 0; j < sorted.length; j++) {
                    if (visited.has(j)) continue;
                    if (Math.abs(curr.x + GRID_X - sorted[j].x) < 15 && Math.abs(curr.y - sorted[j].y) < 15) {
                        group.push(sorted[j]); visited.add(j); curr = sorted[j]; next = true; break;
                    }
                }
            }
            if (group.length >= 3 && validateGroup(group)) foundGroups.push(group);
        }
        return foundGroups;
    }

    function validateGroup(g) {
        const jk = g.filter(t => t.joker);
        const nm = g.filter(t => !t.joker);
        if (nm.length === 0) return true;
        const sameCol = nm.every(t => t.color === nm[0].color);
        if (sameCol) {
            const ns = nm.map(t => t.num).sort((a, b) => a - b);
            let gaps = 0;
            for(let i=1; i<ns.length; i++) gaps += (ns[i] - ns[i-1] - 1);
            if (gaps <= jk.length) return true;
        }
        const sameNum = nm.every(t => t.num === nm[0].num);
        const diffCol = new Set(nm.map(t => t.color)).size === nm.length;
        if (sameNum && diffCol && g.length <= 4) return true;
        return false;
    }

    function drawTileUI(ctx, t, isDrag) {
        const d = 5; const r = 8;
        // 입체 두께 (오른쪽 아래)
        ctx.fillStyle = "#bdc3c7";
        ctx.beginPath(); ctx.roundRect(t.x + d, t.y + d, TILE_W, TILE_H, r); ctx.fill();
        // 타일 앞면
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(t.x, t.y, TILE_W, TILE_H, r); ctx.fill();
        ctx.strokeStyle = isDrag ? "#3498db" : "#bdc3c7"; ctx.lineWidth = isDrag ? 3 : 1; ctx.stroke();
        // 숫자/조커
        if (t.joker) {
            ctx.font = "24px Arial"; ctx.textAlign = "center";
            ctx.fillText("🤡", t.x + TILE_W/2, t.y + TILE_H/2 + 8);
        } else {
            ctx.fillStyle = t.color; ctx.font = "bold 26px Arial Rounded MT Bold";
            ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText(t.num, t.x + TILE_W/2, t.y + TILE_H/2 + 2);
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 흰색 계열 개인 거치대(Rack) 디자인
        ctx.fillStyle = "#ecf0f1";
        ctx.shadowColor = "rgba(0,0,0,0.2)"; ctx.shadowBlur = 10;
        for(let i=0; i<3; i++) {
            ctx.beginPath();
            ctx.roundRect(10, rackY + (i * GRID_Y) + 55, canvas.width - 20, 15, 5);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        tiles.forEach(tile => drawTileUI(ctx, tile, draggingTile === tile));
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        if (y > canvas.height - 80) return;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t; offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]); render(); break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            // 안 겹치게 스냅 및 위치 보정
            draggingTile.x = Math.round((draggingTile.x - 20) / GRID_X) * GRID_X + 20;
            const row = Math.round((draggingTile.y - (rackY + 20)) / GRID_Y);
            draggingTile.y = rackY + 20 + Math.max(0, Math.min(row, 2)) * GRID_Y;
            
            // 동일 위치에 타일이 있으면 옆으로 살짝 밀기 (겹침 방지)
            tiles.forEach(t => {
                if (t !== draggingTile && t.x === draggingTile.x && t.y === draggingTile.y) {
                    draggingTile.x += 10; // 완전히 안 겹치게 시각적 표시
                }
            });
        }
        draggingTile = null; render();
    }

    canvas.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false}); window.addEventListener('touchmove', onMove, {passive: false}); window.addEventListener('touchend', onEnd);
    resize(); drawInitialTiles();
</script>
</body>
</html>
