<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LumiPuzzle - Universal Mobile</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; color: white; }
        canvas { display: block; }
        
        /* 하단 UI 바: 높이를 고정하고 레이어를 높임 */
        .ui-container { 
            position: absolute; bottom: 0; width: 100%; height: 70px; 
            background: #000; display: flex; justify-content: space-around; 
            align-items: center; z-index: 1000; border-top: 1px solid #444;
        }
        button { 
            padding: 10px 14px; font-size: 14px; background: #34495e; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-draw { 
            background: #d35400; width: 54px; height: 54px; border-radius: 50%; 
            font-size: 24px; box-shadow: 0 0 15px rgba(211, 84, 0, 0.5);
        }
        .btn-complete { background: #27ae60; }

        #msg { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; z-index: 10; font-weight: bold; color: #ffeb3b; }
    </style>
</head>
<body>

<div id="msg">조합을 완성하세요!</div>
<canvas id="gameCanvas"></canvas>

<div class="ui-container">
    <button onclick="sortHand('color')">색상별</button>
    <button onclick="sortHand('number')">숫자별</button>
    <button class="btn-draw" onclick="drawOneTile()">+</button>
    <button class="btn-complete" onclick="finishTurn()">확정</button>
    <button onclick="resetGame()" style="background:#7f8c8d;">리셋</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgArea = document.getElementById('msg');
    
    let tiles = [];
    let pool = [];
    let draggingGroup = []; 
    let startX, startY;
    let hasRegistered30 = false;

    // --- 기기 크기에 따른 동적 수치 ---
    let TILE_W, TILE_H, BOARD_TOP, RACK_START_Y, UI_HEIGHT = 70;
    let GRID_X, GRID_Y;

    function initMetrics() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 화면 너비에 맞춰 타일 크기 자동 조절 (한 줄에 약 12~14개 기준)
        TILE_W = Math.floor(canvas.width / 13);
        TILE_H = Math.floor(TILE_W * 1.35);
        
        BOARD_TOP = 50;
        // 거치대 시작 높이: 하단 UI 높이와 타일 2단 높이를 고려하여 계산
        RACK_START_Y = canvas.height - UI_HEIGHT - (TILE_H * 2) - 30;
        
        GRID_X = TILE_W + 4;
        GRID_Y = TILE_H + 6;
        
        reorderRack();
    }

    window.addEventListener('resize', () => { initMetrics(); render(); });

    function resetGame() {
        tiles = []; pool = []; hasRegistered30 = false;
        const colors = ['#3498db', '#e74c3c', '#f1c40f', '#ecf0f1']; // 파, 빨, 노, 흰(검정대용)
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 0, color: '#e74c3c', joker: 'color' });
        pool.push({ num: 0, color: '#3498db', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 14; i++) drawOneTile(true);
        initMetrics();
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        t.place = 'rack';
        tiles.push(t);
        reorderRack();
        if(!isInit) { render(); }
    }

    function reorderRack() {
        let rackTiles = tiles.filter(t => t.place === 'rack');
        // 거치대 타일 배치 (화면 너비를 넘어가면 다음 줄로)
        const itemsPerRow = Math.floor((canvas.width - 20) / GRID_X);
        rackTiles.forEach((t, i) => {
            const row = Math.floor(i / itemsPerRow);
            const col = i % itemsPerRow;
            t.x = t.saveX = 10 + col * GRID_X;
            t.y = t.saveY = RACK_START_Y + row * GRID_Y;
        });
    }

    function sortHand(type) {
        let rackTiles = tiles.filter(t => t.place === 'rack');
        const colorOrder = ['#3498db', '#e74c3c', '#f1c40f', '#ecf0f1'];
        if (type === 'color') {
            rackTiles.sort((a, b) => a.joker ? 1 : b.joker ? -1 : a.color !== b.color ? colorOrder.indexOf(a.color) - colorOrder.indexOf(b.color) : a.num - b.num);
        } else {
            rackTiles.sort((a, b) => a.joker ? 1 : b.joker ? -1 : a.num !== b.num ? a.num - b.num : colorOrder.indexOf(a.color) - colorOrder.indexOf(b.color));
        }
        reorderRack();
        render();
    }

    function drawTileUI(ctx, t, isDrag) {
        const r = 4;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(t.x, t.y, TILE_W, TILE_H, r); ctx.fill();
        
        ctx.strokeStyle = isDrag ? "#3498db" : "#bdc3c7";
        ctx.lineWidth = isDrag ? 3 : 1;
        ctx.stroke();

        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillStyle = t.color;
        if (t.joker) {
            ctx.font = `${TILE_W*0.6}px Arial`; ctx.fillText("🤡", t.x + TILE_W/2, t.y + TILE_H/2);
        } else {
            ctx.font = `bold ${TILE_W*0.5}px sans-serif`; ctx.fillText(t.num, t.x + TILE_W/2, t.y + TILE_H/2);
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 보드 배경
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.fillRect(5, BOARD_TOP, canvas.width - 10, RACK_START_Y - BOARD_TOP - 10);

        // 거치대 배경 (나무느낌 오렌지)
        ctx.fillStyle = "#e67e22";
        ctx.fillRect(0, RACK_START_Y - 10, canvas.width, canvas.height - RACK_START_Y - UI_HEIGHT + 10);

        tiles.filter(t => !draggingGroup.includes(t)).forEach(tile => drawTileUI(ctx, tile, false));
        draggingGroup.forEach(tile => drawTileUI(ctx, tile, true));
    }

    function getValidDraggingGroup(startTile, clickX) {
        const relX = clickX - startTile.x;
        // 타일의 아주 사이드를 눌렀을 때만 뭉치 이동 작동
        if (relX > TILE_W * 0.2 && relX < TILE_W * 0.8) return [startTile];

        let connected = [startTile];
        let queue = [startTile];
        while(queue.length > 0) {
            let curr = queue.shift();
            tiles.forEach(t => {
                if (t.place === startTile.place && !connected.includes(t)) {
                    if (Math.abs(t.y - curr.y) < 10 && Math.abs(Math.abs(t.x - curr.x) - GRID_X) < 10) {
                        connected.push(t); queue.push(t);
                    }
                }
            });
        }
        
        // 거치대에서는 실제 세트 규칙이 맞아야 뭉치로 인정
        if (startTile.place === 'rack') {
            connected.sort((a,b) => a.x - b.x);
            if (connected.length < 3 || !validate(connected).ok) return [startTile];
        }
        return connected.sort((a,b) => a.x - b.x);
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        // UI 바 클릭 방지
        if (y > canvas.height - UI_HEIGHT) return;

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                startX = x; startY = y;
                draggingGroup = getValidDraggingGroup(t, x);
                draggingGroup.forEach(dt => {
                    tiles.push(tiles.splice(tiles.indexOf(dt), 1)[0]);
                    dt.initX = dt.x; dt.initY = dt.y;
                });
                render(); break;
            }
        }
    }

    function onMove(e) {
        if (draggingGroup.length === 0) return;
        const ev = e.touches ? e.touches[0] : e;
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        draggingGroup.forEach(t => { t.x = t.initX + dx; t.y = t.initY + dy; });
        render();
    }

    function onEnd() {
        if (draggingGroup.length === 0) return;
        let master = draggingGroup[0];
        let mX, mY, p;

        if (master.y < RACK_START_Y - 20) {
            mX = Math.round((master.x - 10) / GRID_X) * GRID_X + 10;
            mY = Math.round((master.y - BOARD_TOP) / GRID_Y) * GRID_Y + BOARD_TOP;
            p = 'board';
        } else {
            let row = Math.round((master.y - RACK_START_Y) / GRID_Y);
            mX = Math.round((master.x - 10) / GRID_X) * GRID_X + 10;
            mY = RACK_START_Y + Math.max(0, Math.min(row, 1)) * GRID_Y;
            p = 'rack';
        }

        draggingGroup.forEach((t, i) => {
            t.x = t.saveX = mX + (i * GRID_X);
            t.y = t.saveY = mY;
            t.place = p;
        });
        draggingGroup = []; render();
    }

    function validate(group) {
        if (group.length === 0) return { ok: false };
        const g = [...group].sort((a,b) => a.x - b.x);
        const reals = g.filter(t => !t.joker);
        if (reals.length === 0) return { ok: true, score: 30 };
        const isRun = reals.every(t => t.color === reals[0].color);
        const isSet = reals.every(t => t.num === reals[0].num);
        if (isRun) {
            let firstIdx = g.findIndex(t => !t.joker);
            let start = g[firstIdx].num - firstIdx;
            for(let i=0; i<g.length; i++) {
                let expect = start + i;
                if (expect < 1 || expect > 13 || (!g[i].joker && g[i].num !== expect)) return { ok: false };
            }
            return { ok: true, score: 30 };
        }
        if (isSet) {
            if (g.length > 4) return { ok: false };
            const uC = new Set();
            for (let t of reals) { if (uC.has(t.color)) return { ok: false }; uC.add(t.color); }
            return { ok: true, score: 30 };
        }
        return { ok: false };
    }

    function finishTurn() {
        tiles.forEach(t => { t.saveX = t.x; t.saveY = t.y; });
        msgArea.innerText = "조합 확정 성공!";
        render();
    }

    initMetrics();
    resetGame();
    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
    window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive: false});
    window.addEventListener('touchend', onEnd);
</script>
</body>
</html>
