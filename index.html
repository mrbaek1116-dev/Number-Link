<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Final Step 7</title>
    <style>
        body { margin: 0; background: #000; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; }
        button { 
            padding: 10px 12px; font-size: 13px; background: #333; color: white; 
            border: 2px solid #555; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-check { background: #e67e22; border-color: #d35400; }
        .btn-sort { background: #2980b9; border-color: #3498db; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: Step 7 Final</h3>
    <p style="margin:5px; font-size:11px; color:#aaa;">타일 입체감 추가 및 중복 숫자 규칙 반영</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋 (42장)</button>
    <button class="btn-sort" onclick="sortTiles()">색상 정렬</button>
    <button class="btn-check" onclick="checkBoardRules()">조합 확인</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 55; 
    // 타일 크기를 살짝 줄임 (46x60 -> 44x58)
    const TILE_W = 44, TILE_H = 58;
    const colors = ['#FF3B30', '#FFCC00', '#007AFF', '#FF9500']; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = [];
        const startY = 60; 
        for (let i = 0; i < 42; i++) {
            tiles.push({
                x: 10 + (i % 6) * 60,
                y: startY + Math.floor(i / 6) * 78, // 줄 간격을 더 넓힘 (75 -> 78)
                num: Math.floor(Math.random() * 13) + 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        render();
    }

    function sortTiles() {
        tiles.sort((a, b) => {
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        const startY = 60; 
        tiles.forEach((t, i) => {
            t.x = 10 + (i % 6) * 60;
            t.y = startY + Math.floor(i / 6) * 78;
        });
        render();
    }

    function checkBoardRules() {
        const groups = findGroups();
        if (groups.length === 0) { alert("가로로 3장 이상 붙여주세요!"); return; }
        let msg = "";
        groups.forEach((group, i) => {
            const result = validateGroup(group);
            msg += `조합 ${i+1}: ${result ? (result === "RUN" ? "연속 성공! ✅" : "그룹 성공! ✅") : "규칙 위반 ❌"}\n`;
        });
        alert(msg);
    }

    function findGroups() {
        const foundGroups = [];
        const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);

        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]];
            visited.add(i);
            let current = sortedTiles[i];
            let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_SIZE - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 15 && dy < 10) {
                        group.push(sortedTiles[j]);
                        visited.add(j);
                        current = sortedTiles[j];
                        foundNext = true;
                        break;
                    }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    // [핵심 수정] 중복 숫자 판정 로직 추가
    function validateGroup(group) {
        group.sort((a, b) => a.num - b.num);
        
        // 1. 연속 (Run) 판정: 같은 색, 연속된 숫자
        const sameColor = group.every(t => t.color === group[0].color);
        const nums = group.map(t => t.num);
        const isSeq = nums.every((n, i) => i === 0 || n === nums[i-1] + 1);
        if (sameColor && isSeq) return "RUN";

        // 2. 그룹 (Group) 판정: 같은 숫자, 다른 색상
        const sameNum = group.every(t => t.num === group[0].num);
        // [수정] 색상 집합의 크기가 타일 개수와 같아야 함 (중복 색상 없음)
        const diffCols = new Set(group.map(t => t.color)).size === group.length;
        // [추가] 같은 숫자는 최대 4장까지만 가능 (색상이 4개뿐이므로 diffCols가 해결해주지만 명시적 추가)
        if (sameNum && diffCols && group.length <= 4) return "GROUP";

        return null;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#222";
        for (let x = 0; x <= canvas.width; x += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y <= canvas.height; y += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

        tiles.forEach(tile => {
            // [입체 디자인] 그림자 효과 추가
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetY = 3;

            // 타일 몸체
            ctx.fillStyle = "#F5F5F5";
            ctx.beginPath(); ctx.roundRect(tile.x, tile.y, TILE_W, TILE_H, 5); ctx.fill();
            
            // [입체 디자인] 하단 두께 표현
            ctx.fillStyle = "#DCDCDC";
            ctx.beginPath(); ctx.roundRect(tile.x, tile.y + TILE_H - 4, TILE_W, 4, {bl: 5, br: 5}); ctx.fill();
            
            ctx.restore();

            // 테두리 (선택 시 파란색)
            ctx.strokeStyle = (draggingTile === tile) ? "#007AFF" : "#888";
            ctx.lineWidth = (draggingTile === tile) ? 2 : 1;
            ctx.stroke();

            // 숫자
            ctx.fillStyle = tile.color;
            ctx.font = "bold 24px Arial"; // 폰트 크기 살짝 키움
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        if (y > canvas.height - 70) return;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            draggingTile.x = Math.floor(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.floor(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null;
        render();
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
