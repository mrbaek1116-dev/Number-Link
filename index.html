<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Step 7 Fixed</title>
    <style>
        body { margin: 0; background: #000000; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; }
        button { 
            padding: 12px 20px; font-size: 15px; background: #333; color: white; 
            border: 2px solid #555; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-check { background: #e67e22; border-color: #d35400; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div class="header">
    <h3 id="status" style="margin:0;">Tile Run: 정밀 검증</h3>
    <p style="margin:5px; font-size:12px; color:#aaa;">타일을 정확히 칸 안에 붙여보세요!</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">타일 리셋</button>
    <button class="btn-check" onclick="checkBoardRules()">조합 확인</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 55; 
    const TILE_W = 48, TILE_H = 62;
    // 잘 보이는 색상으로 변경: 빨강, 노랑, 파랑, 주황
    const colors = ['#FF3B30', '#FFCC00', '#007AFF', '#FF9500']; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = [];
        // 내 카드가 잘리지 않도록 시작 위치를 더 위로 조정
        const startY = canvas.height - 230; 
        for (let i = 0; i < 14; i++) {
            tiles.push({
                x: 15 + (i % 5) * 60,
                y: startY + Math.floor(i / 5) * 70,
                num: Math.floor(Math.random() * 13) + 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        render();
    }

    function checkBoardRules() {
        const groups = findGroups();
        if (groups.length === 0) {
            alert("타일 3장 이상을 붙여주세요!");
            return;
        }

        let msg = "";
        groups.forEach((group, i) => {
            const result = validateGroup(group);
            msg += `조합 ${i+1}: ${result ? (result === "RUN" ? "연속 성공! ✅" : "그룹 성공! ✅") : "규칙 위반 ❌"}\n`;
        });
        alert(msg);
    }

    function findGroups() {
        const foundGroups = [];
        const visited = new Set();
        // 정렬: 같은 줄에 있는 타일들부터 찾기 위해 y값 기준 정렬
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);

        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]];
            visited.add(i);

            for (let j = 0; j < sortedTiles.length; j++) {
                if (visited.has(j)) continue;
                // 가로로 바로 옆 칸에 있는지 확인
                const dx = Math.abs(sortedTiles[i].x - sortedTiles[j].x);
                const dy = Math.abs(sortedTiles[i].y - sortedTiles[j].y);
                if (dx < GRID_SIZE * 1.2 && dy < 10) { 
                    group.push(sortedTiles[j]);
                    visited.add(j);
                    // 기준 타일을 방금 찾은 타일로 업데이트해서 옆으로 계속 찾게 함
                    i = tiles.indexOf(sortedTiles[j]); 
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    function validateGroup(group) {
        // 숫자 정렬
        group.sort((a, b) => a.num - b.num);
        
        const sameColor = group.every(t => t.color === group[0].color);
        const nums = group.map(t => t.num);
        const isSeq = nums.every((n, i) => i === 0 || n === nums[i-1] + 1);
        if (sameColor && isSeq) return "RUN";

        const sameNum = group.every(t => t.num === group[0].num);
        const diffCols = new Set(group.map(t => t.color)).size === group.length;
        if (sameNum && diffCols) return "GROUP";

        return null;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 바둑판 그리드 (가로/세로 모두 그리기)
        ctx.strokeStyle = "#222";
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        tiles.forEach(tile => {
            // 타일 배경 (노란빛 도는 아이보리색으로 변경)
            ctx.fillStyle = "#F5F5F5";
            ctx.beginPath();
            ctx.roundRect(tile.x, tile.y, TILE_W, TILE_H, 4);
            ctx.fill();
            
            ctx.strokeStyle = (draggingTile === tile) ? "#FFCC00" : "#888";
            ctx.lineWidth = (draggingTile === tile) ? 3 : 1;
            ctx.stroke();

            // 숫자 (검정색 외곽선 추가해서 더 선명하게)
            ctx.fillStyle = tile.color;
            ctx.font = "bold 24px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            // 칸의 정중앙에 배치되도록 정밀 스냅
            draggingTile.x = Math.floor(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.floor(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null;
        render();
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
