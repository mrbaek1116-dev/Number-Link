<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Board Focus</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; }
        button { padding: 12px 16px; font-size: 14px; background: #2c3e50; color: white; border: 1px solid #34495e; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-complete { background: #27ae60; }
        .btn-draw { background: #8e44ad; }
        .pool-info { position: absolute; top: 15px; right: 20px; color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

<div id="pool-display" class="pool-info">더미: 0</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋</button>
    <button class="btn-draw" onclick="drawOneTile()">타일 뽑기</button>
    <button onclick="sortHand()">손패 정렬</button>
    <button class="btn-complete" onclick="submitToBoard()">조합 등록</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const TILE_W = 46, TILE_H = 60;
    const GRID_X = 55, GRID_Y = 70;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    
    let handLineY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // 핸드 영역을 버튼 위쪽으로 넉넉히(150px 이상) 띄움
        handLineY = canvas.height - 250; 
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = []; pool = [];
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 'J', color: 'color', joker: 'color' }, { num: 'J', color: 'bw', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < 14; i++) { drawOneTile(true); }
        updatePoolDisplay();
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        
        const handTiles = tiles.filter(tile => tile.y >= handLineY);
        const idx = handTiles.length;
        
        // 가로 폭에 맞춰 자동 줄바꿈 (가로 여백 20px 제외)
        const maxCols = Math.floor((canvas.width - 40) / GRID_X);
        t.x = 20 + (idx % maxCols) * GRID_X;
        t.y = handLineY + 30 + Math.floor(idx / maxCols) * GRID_Y;
        
        tiles.push(t);
        if(!isInit) { updatePoolDisplay(); render(); }
    }

    function updatePoolDisplay() { document.getElementById('pool-display').innerText = `남은 타일: ${pool.length}`; }

    function sortHand() {
        let boardTiles = tiles.filter(t => t.y < handLineY);
        let handTiles = tiles.filter(t => t.y >= handLineY);

        handTiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });

        const maxCols = Math.floor((canvas.width - 40) / GRID_X);
        handTiles.forEach((t, i) => {
            t.x = 20 + (i % maxCols) * GRID_X;
            t.y = handLineY + 30 + Math.floor(i / maxCols) * GRID_Y;
        });

        tiles = [...boardTiles, ...handTiles];
        render();
    }

    function submitToBoard() { render(); }

    function drawHexTile(ctx, x, y, w, h, isDragging) {
        const r = 8; const d = 4;
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.roundRect(x+d, y+d, w, h, r); ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
        ctx.strokeStyle = isDragging ? "#3498db" : "#bdc3c7";
        ctx.lineWidth = isDragging ? 3 : 1;
        ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 구분선 및 구역 표시
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.moveTo(0, handLineY); ctx.lineTo(canvas.width, handLineY); ctx.stroke();
        
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText("BOARD (중앙 보드 영역)", 20, 30);
        ctx.fillText("HAND (내 손패)", 20, handLineY + 20);

        tiles.forEach(tile => {
            drawHexTile(ctx, tile.x, tile.y, TILE_W, TILE_H, draggingTile === tile);
            if (tile.joker) {
                ctx.fillStyle = "#333"; ctx.font = "bold 22px Arial"; ctx.textAlign = "center";
                ctx.fillText("J", tile.x + TILE_W/2, tile.y + TILE_H/2 + 8);
            } else {
                ctx.fillStyle = tile.color; ctx.font = "bold 26px Arial Rounded MT Bold";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2 + 2);
            }
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        
        // 버튼 영역(하단 100px) 터치 무시
        if (y > canvas.height - 100) return;

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                render();
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            // 보드와 핸드 그리드 정렬 보정
            draggingTile.x = Math.round((draggingTile.x - 20) / GRID_X) * GRID_X + 20;
            const startRefY = draggingTile.y >= handLineY ? handLineY + 30 : 50;
            draggingTile.y = Math.round((draggingTile.y - startRefY) / GRID_Y) * GRID_Y + startRefY;
            
            // [추가] 작업표시줄 뒤로 숨지 않도록 하단 한계선 설정
            if (draggingTile.y > canvas.height - 130) draggingTile.y = canvas.height - 140;
        }
        draggingTile = null;
        render();
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
