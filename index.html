<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Phase 3 (Drag & Drop)</title>
    <style>
        body { margin: 0; background: #1a1e2a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = {
    rackTiles: [],
    draggingTile: null, // 현재 잡고 있는 타일
    offset: { x: 0, y: 0 }, // 타일 내부 클릭 지점 보정
    renderParams: {}
};

// 1. 레이아웃 및 타일 초기화 (Phase 2 로직 포함)
function updateLayout() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const padding = 10;
    const availableW = canvas.width - (padding * 2);
    let countPerRow = 10; 
    let tileW = Math.min(60, availableW / countPerRow - 4);
    let tileH = tileW * 1.33;

    gameState.renderParams = {
        tileW, tileH, padding,
        fontSize: Math.floor(tileH * 0.45),
        depth: tileH * 0.08
    };

    // 초기 배치 (x, y 좌표를 데이터에 저장)
    const startY = canvas.height - (tileH * 2.5);
    gameState.rackTiles.forEach((tile, i) => {
        if (tile === gameState.draggingTile) return; // 드래그 중인 건 건드리지 않음
        const row = Math.floor(i / countPerRow);
        const col = i % countPerRow;
        tile.x = padding + col * (tileW + 4);
        tile.y = startY + row * (tileH + 9);
    });
}

// 2. 4D 타일 그리기 (x, y 좌표 기반)
function drawTile(tile) {
    const { tileW, tileH, fontSize, depth } = gameState.renderParams;
    const { x, y, num, color } = tile;
    const r = 4;

    ctx.save();
    // 드래그 중일 때 효과 (그림자 더 크게)
    if (gameState.draggingTile === tile) {
        ctx.shadowBlur = 15;
        ctx.shadowOffsetY = 8;
        ctx.translate(-2, -2); // 살짝 떠오르는 느낌
    } else {
        ctx.shadowBlur = 6;
        ctx.shadowOffsetY = 3;
    }
    ctx.shadowColor = "rgba(0,0,0,0.5)";

    // 몸체와 숫자 (Phase 2와 동일)
    ctx.fillStyle = "#d9d9d9";
    ctx.beginPath(); ctx.roundRect(x, y + depth, tileW, tileH, r); ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.roundRect(x, y, tileW, tileH, r); ctx.fill();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = `bold ${fontSize}px Arial`; ctx.fillStyle = color;
    ctx.fillText(num, x + tileW/2, y + tileH/2 + 1);
    ctx.restore();
}

// 3. 이벤트 리스너 (마우스 & 터치 통합)
function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function onStart(e) {
    const pos = getPointerPos(e);
    const { tileW, tileH } = gameState.renderParams;

    // 역순으로 검사 (위에 그려진 타일부터 잡히게)
    for (let i = gameState.rackTiles.length - 1; i >= 0; i--) {
        const t = gameState.rackTiles[i];
        if (pos.x >= t.x && pos.x <= t.x + tileW && pos.y >= t.y && pos.y <= t.y + tileH) {
            gameState.draggingTile = t;
            gameState.offset.x = pos.x - t.x;
            gameState.offset.y = pos.y - t.y;
            
            // 잡은 타일을 배열 맨 뒤로 보내서 가장 위에 그려지게 함
            gameState.rackTiles.splice(i, 1);
            gameState.rackTiles.push(t);
            break;
        }
    }
}

function onMove(e) {
    if (!gameState.draggingTile) return;
    const pos = getPointerPos(e);
    gameState.draggingTile.x = pos.x - gameState.offset.x;
    gameState.draggingTile.y = pos.y - gameState.offset.y;
}

function onEnd() {
    if (!gameState.draggingTile) return;
    gameState.draggingTile = null;
    updateLayout(); // 놓았을 때 다시 정렬 (임시)
}

canvas.addEventListener('mousedown', onStart);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onEnd);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive: false});
window.addEventListener('touchend', onEnd);

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    gameState.rackTiles.forEach(drawTile);
    requestAnimationFrame(render);
}

// 초기 데이터
const colors = ['#e53e3e', '#3182ce', '#ed8936', '#2d3748'];
for(let i=1; i<=14; i++) {
    gameState.rackTiles.push({ num: i % 13 || 13, color: colors[i % 4], x: 0, y: 0 });
}

window.addEventListener('resize', updateLayout);
updateLayout();
render();
</script>
</body>
</html>
