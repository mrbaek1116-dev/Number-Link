<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Draw & Win</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; flex-wrap: wrap; }
        button { 
            padding: 12px 15px; font-size: 13px; background: #2c3e50; color: white; 
            border: 2px solid #34495e; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
        .btn-complete { background: #27ae60; border-color: #2ecc71; }
        .btn-draw { background: #8e44ad; border-color: #9b59b6; } /* 보라색 드로우 버튼 */
        .header { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
        .pool-count { position: absolute; top: 50px; right: 20px; color: #f1c40f; font-weight: bold; font-size: 18px; }
        
        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: #f1c40f; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: 드로우 시스템</h3>
</div>
<div class="pool-count" id="pool-display">남은 타일: 0</div>

<div id="win-overlay">
    <h1 style="font-size:50px;">🎉 VICTORY! 🎉</h1>
    <p>모든 타일을 털어냈습니다!</p>
    <button onclick="drawInitialTiles(); document.getElementById('win-overlay').style.display='none';">다시 하기</button>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋</button>
    <button class="btn-draw" onclick="drawOneTile()">타일 한 장 가져오기</button>
    <button class="btn-sort" onclick="sortTiles()">정렬</button>
    <button class="btn-complete" onclick="submitRegistration()">조합 등록 (제거)</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let pool = []; // 전체 타일 더미
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 65; 
    const TILE_W = 48, TILE_H = 64;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    // [10단계] 전체 106장 덱 생성 후 14장 배분, 나머지는 pool에 보관
    function drawInitialTiles() {
        tiles = [];
        pool = [];
        
        // 1. 전체 덱 구성 (1~13 각 색상별 2세트 + 조커 2장 = 총 106장)
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => {
                for (let n = 1; n <= 13; n++) { pool.push({ num: n, color: c, joker: null }); }
            });
        }
        pool.push({ num: 'J', color: 'color', joker: 'color' });
        pool.push({ num: 'J', color: 'bw', joker: 'bw' });

        // 2. 셔플
        pool.sort(() => Math.random() - 0.5);

        // 3. 14장 먼저 뽑기
        const startY = canvas.height - 350; 
        for (let i = 0; i < 14; i++) {
            let t = pool.pop();
            t.x = 30 + (i % 5) * 70;
            t.y = startY + Math.floor(i / 5) * 85;
            tiles.push(t);
        }
        updatePoolDisplay();
        render();
    }

    // [10단계] 타일 한 장 가져오기 기능
    function drawOneTile() {
        if (pool.length === 0) { alert("더미에 타일이 없습니다!"); return; }
        
        let t = pool.pop();
        // 화면 중앙 적당한 곳에 생성
        t.x = canvas.width / 2 - TILE_W / 2;
        t.y = canvas.height / 2 - TILE_H / 2;
        
        tiles.push(t);
        updatePoolDisplay();
        render();
    }

    function updatePoolDisplay() {
        document.getElementById('pool-display').innerText = `남은 타일: ${pool.length}`;
    }

    // 정렬 로직
    function sortTiles() {
        tiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        const startY = canvas.height - 350;
        tiles.forEach((t, i) => {
            t.x = 30 + (i % 5) * 70;
            t.y = startY + Math.floor(i / 5) * 85;
        });
        render();
    }

    // 등록 로직 (성공 시 타일 제거)
    function submitRegistration() {
        const groups = findGroups();
        if (groups.length === 0) { alert("3장 이상 붙여주세요!"); return; }
        
        let removedIds = new Set();
        let success = false;

        groups.forEach(group => {
            if (validateGroupWithJoker(group)) {
                group.forEach(t => removedIds.add(`${t.x},${t.y}`));
                success = true;
            }
        });

        if (!success) { alert("맞는 조합이 없습니다."); return; }

        tiles = tiles.filter(t => !removedIds.has(`${t.x},${t.y}`));
        render();

        if (tiles.length === 0) {
            document.getElementById('win-overlay').style.display = 'flex';
        }
    }

    // --- 이하 그리기 및 규칙 판정 로직 (광대 조커 포함) ---

    function findGroups() {
        const foundGroups = []; const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);
        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]]; visited.add(i);
            let current = sortedTiles[i]; let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_SIZE - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 25 && dy < 15) { group.push(sortedTiles[j]); visited.add(j); current = sortedTiles[j]; foundNext = true; break; }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    function validateGroupWithJoker(group) {
        const jokerCount = group.filter(t => t.joker).length;
        const normalTiles = group.filter(t => !t.joker);
        if (normalTiles.length > 0) {
            const sameColor = normalTiles.every(t => t.color === normalTiles[0].color);
            if (sameColor) {
                const nums = normalTiles.map(t => t.num).sort((a, b) => a - b);
                let neededJokers = 0;
                for (let i = 1; i < nums.length; i++) neededJokers += nums[i] - nums[i - 1] - 1;
                if (neededJokers <= jokerCount) return "RUN";
            }
            const sameNum = normalTiles.every(t => t.num === normalTiles[0].num);
            const diffCols = new Set(normalTiles.map(t => t.color)).size === normalTiles.length;
            if (sameNum && diffCols && group.length <= 4) return "GROUP";
        } else if (jokerCount >= 3) return "RUN";
        return null;
    }

    function drawClownJoker(ctx, x, y, w, h, type) {
        ctx.save(); ctx.translate(x + w / 2, y + h / 2);
        ctx.fillStyle = type === 'color' ? "#2c3e50" : "#555";
        ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(12, -8); ctx.lineTo(15, 5); ctx.lineTo(0, 18); ctx.lineTo(-15, 5); ctx.lineTo(-12, -8); ctx.closePath(); ctx.fill();
        ctx.fillStyle = type === 'color' ? "#f1c40f" : "#aaa";
        ctx.beginPath(); ctx.arc(-6, -3, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(6, -3, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = type === 'color' ? "#e74c3c" : "#aaa"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-10, 5); ctx.quadraticCurveTo(0, 15, 10, 5); ctx.stroke();
        ctx.restore();
    }

    function drawHexTile(ctx, x, y, w, h, isDragging) {
        const r = 10; const d = 5; 
        ctx.fillStyle = "#bdc3c7"; ctx.beginPath(); ctx.roundRect(x + d, y + d, w, h, r); ctx.fill();
        ctx.fillStyle = "#ecf0f1"; ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
        ctx.strokeStyle = isDragging ? "#3498db" : "#95a5a6"; ctx.lineWidth = isDragging ? 3 : 1; ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for (let x = 0; x <= canvas.width; x += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y <= canvas.height; y += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
        tiles.forEach(tile => {
            drawHexTile(ctx, tile.x, tile.y, TILE_W, TILE_H, draggingTile === tile);
            if (tile.joker) drawClownJoker(ctx, tile.x, tile.y, TILE_W, TILE_H, tile.joker);
            else {
                ctx.fillStyle = tile.color; ctx.font = "bold 26px Arial Rounded MT Bold"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
            }
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        if (y > canvas.height - 120) return;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t; offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]); render(); break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX; draggingTile.y = ev.clientY - offsetY; render();
    }
    function onEnd() {
        if (draggingTile) {
            draggingTile.x = Math.round(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.round(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null; render();
    }

    canvas.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false}); window.addEventListener('touchmove', onMove, {passive: false}); window.addEventListener('touchend', onEnd);
    resize(); drawInitialTiles();
</script>
</body>
</html>
