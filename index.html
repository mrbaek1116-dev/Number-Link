<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Clown Joker & Win</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        button { 
            padding: 12px 18px; font-size: 14px; background: #2c3e50; color: white; 
            border: 2px solid #34495e; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-complete { background: #27ae60; border-color: #2ecc71; } /* 초록색으로 변경 */
        .btn-sort { background: #2980b9; border-color: #3498db; }
        .header { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
        
        /* 승리 팝업 스타일 */
        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: #f1c40f; z-index: 1000; text-align: center;
        }
        #win-overlay h1 { font-size: 60px; margin: 0; text-shadow: 0 0 20px #f1c40f; }
        #win-overlay p { font-size: 20px; color: white; margin: 20px 0 40px; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: 승리 판정</h3>
    <p style="margin:5px; font-size:12px; color:#aaa;">타일을 다 터는 사람이 승리합니다!</p>
</div>

<div id="win-overlay">
    <h1>VICTORY!</h1>
    <p>모든 타일을 등록했습니다.</p>
    <button onclick="drawInitialTiles(); document.getElementById('win-overlay').style.display='none';">새 게임 시작</button>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋 (14장)</button>
    <button class="btn-sort" onclick="sortTiles()">숫자 정렬</button>
    <button class="btn-complete" onclick="submitRegistration()">조합 등록</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 65; 
    const TILE_W = 48, TILE_H = 64;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22']; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = [];
        let fullDeck = [];
        for (let i = 0; i < 2; i++) {
            colors.forEach(color => {
                for (let n = 1; n <= 13; n++) {
                    fullDeck.push({ num: n, color: color, joker: null });
                }
            });
        }
        // 조커 2장 (광대 디자인으로 변경)
        fullDeck.push({ num: 'J', color: 'color', joker: 'color' }); // 컬러 광대
        fullDeck.push({ num: 'J', color: 'bw', joker: 'bw' });       // 흑백 광대

        fullDeck.sort(() => Math.random() - 0.5);

        const startY = canvas.height - 350; 
        for (let i = 0; i < 14; i++) {
            let t = fullDeck[i];
            t.x = 30 + (i % 5) * 70;
            t.y = startY + Math.floor(i / 5) * 85;
            tiles.push(t);
        }
        render();
    }

    function sortTiles() {
        tiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.joker && b.joker) return 0;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        const startY = canvas.height - 350;
        tiles.forEach((t, i) => {
            t.x = 30 + (i % 5) * 70;
            t.y = startY + Math.floor(i / 5) * 85;
        });
        render();
    }

    // [9단계 핵심] 조합 등록 및 승리 판정
    function submitRegistration() {
        const groups = findGroups();
        if (groups.length === 0) { alert("가로로 3장 이상 붙여주세요!"); return; }
        
        let removedIds = new Set();
        let successCount = 0;

        groups.forEach((group) => {
            const result = validateGroupWithJoker(group);
            if (result) {
                // 성공한 조합의 타일 ID를 수집 (타일에 ID가 없으므로 x,y좌표로 식별)
                group.forEach(t => removedIds.add(`${t.x},${t.y}`));
                successCount++;
            }
        });

        if (successCount === 0) {
            alert("규칙에 맞는 조합이 하나도 없습니다.");
            return;
        }

        // 성공한 타일들만 핸드에서 제거
        tiles = tiles.filter(t => !removedIds.has(`${t.x},${t.y}`));
        alert(`${successCount}개의 조합이 등록되었습니다!`);
        
        render();

        // 승리 판정
        if (tiles.length === 0) {
            document.getElementById('win-overlay').style.display = 'flex';
        }
    }

    // 규칙 판정 로직 (기존과 동일)
    function findGroups() {
        const foundGroups = [];
        const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);
        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]];
            visited.add(i);
            let current = sortedTiles[i];
            let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_SIZE - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 25 && dy < 15) {
                        group.push(sortedTiles[j]);
                        visited.add(j);
                        current = sortedTiles[j];
                        foundNext = true;
                        break;
                    }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    function validateGroupWithJoker(group) {
        const jokerCount = group.filter(t => t.joker).length;
        const normalTiles = group.filter(t => !t.joker);
        if (normalTiles.length > 0) {
            const sameColor = normalTiles.every(t => t.color === normalTiles[0].color);
            if (sameColor) {
                const nums = normalTiles.map(t => t.num).sort((a, b) => a - b);
                let neededJokers = 0;
                for (let i = 1; i < nums.length; i++) {
                    neededJokers += nums[i] - nums[i - 1] - 1;
                }
                if (neededJokers <= jokerCount) return "RUN";
            }
        } else if (jokerCount >= 3) return "RUN";
        if (normalTiles.length > 0) {
            const sameNum = normalTiles.every(t => t.num === normalTiles[0].num);
            const cols = normalTiles.map(t => t.color);
            const diffCols = new Set(cols).size === cols.length;
            if (sameNum && diffCols && group.length <= 4) return "GROUP";
        } else if (jokerCount >= 3) return "GROUP";
        return null;
    }

    // [9단계 수정] 스마일 대신 미스터리한 광대 고스트 디자인
    function drawClownJoker(ctx, x, y, w, h, type) {
        ctx.save();
        ctx.translate(x + w / 2, y + h / 2);
        
        // 광대 얼굴 실루엣 (조금 더 뾰족하고 미스터리하게)
        ctx.fillStyle = type === 'color' ? "#2c3e50" : "#555";
        ctx.beginPath();
        ctx.moveTo(0, -18); // 위쪽 뾰족
        ctx.lineTo(12, -8); ctx.lineTo(15, 5); ctx.lineTo(0, 18); // 아래쪽 뾰족
        ctx.lineTo(-15, 5); ctx.lineTo(-12, -8);
        ctx.closePath();
        ctx.fill();

        // 눈 (미스터리한 점)
        ctx.fillStyle = type === 'color' ? "#f1c40f" : "#aaa"; // 컬러는 노랑, 흑백은 연회색
        ctx.beginPath(); ctx.arc(-6, -3, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(6, -3, 2.5, 0, Math.PI * 2); ctx.fill();

        // 뾰족한 입 (입술 모양)
        ctx.strokeStyle = type === 'color' ? "#e74c3c" : "#aaa";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-10, 5);
        ctx.quadraticCurveTo(0, 15, 10, 5); // 아래로 뾰족한 입
        ctx.stroke();
        
        // 광대 모자 방울 효과 (컬러 조커만)
        if (type === 'color') {
            ctx.fillStyle = "#3498db"; ctx.beginPath(); ctx.arc(-15, -12, 4, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "#27ae60"; ctx.beginPath(); ctx.arc(15, -12, 4, 0, Math.PI * 2); ctx.fill();
        }
        
        ctx.restore();
    }

    function drawHexTile(ctx, x, y, w, h, isDragging) {
        const r = 10; const d = 5; 
        ctx.fillStyle = "#bdc3c7"; ctx.beginPath(); ctx.roundRect(x + d, y + d, w, h, r); ctx.fill();
        ctx.fillStyle = "#ecf0f1"; ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
        ctx.strokeStyle = isDragging ? "#3498db" : "#95a5a6"; ctx.lineWidth = isDragging ? 3 : 1; ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y <= canvas.height; y += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

        tiles.forEach(tile => {
            drawHexTile(ctx, tile.x, tile.y, TILE_W, TILE_H, draggingTile === tile);
            if (tile.joker) {
                // [수정] 새로운 광대 고스트 디자인 적용
                drawClownJoker(ctx, tile.x, tile.y, TILE_W, TILE_H, tile.joker);
            } else {
                ctx.fillStyle = tile.color; ctx.font = "bold 26px Arial Rounded MT Bold"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
            }
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        if (y > canvas.height - 100) return;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t; offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]); render(); break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX; draggingTile.y = ev.clientY - offsetY; render();
    }
    function onEnd() {
        if (draggingTile) {
            draggingTile.x = Math.round(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.round(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null; render();
    }

    canvas.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false}); window.addEventListener('touchmove', onMove, {passive: false}); window.addEventListener('touchend', onEnd);
    resize(); drawInitialTiles();
</script>
</body>
</html>
