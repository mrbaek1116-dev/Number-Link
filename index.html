<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Octagon Pro</title>
    <style>
        body { margin: 0; background: #1a1e2a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    render();
}

function drawOctagon(ctx, x, y, w, h, b) {
    ctx.beginPath();
    ctx.moveTo(x + b, y);
    ctx.lineTo(x + w - b, y);
    ctx.lineTo(x + w, y + b);
    ctx.lineTo(x + w, y + h - b);
    ctx.lineTo(x + w - b, y + h);
    ctx.lineTo(x + b, y + h);
    ctx.lineTo(x, y + h - b);
    ctx.lineTo(x, y + b);
    ctx.closePath();
}

function drawProTile(x, y, num, color) {
    const w = 45; const h = 60; const b = 8; const t = 4;
    ctx.save();
    // Shadow
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
    // Side
    ctx.fillStyle = "#cbd5e0";
    drawOctagon(ctx, x, y + t, w, h, b); ctx.fill();
    // Top
    ctx.shadowColor = "transparent";
    ctx.fillStyle = "#ffffff";
    drawOctagon(ctx, x, y, w, h, b); ctx.fill();
    // Text
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "bold 26px Arial";
    ctx.fillStyle = color;
    ctx.fillText(num, x + w/2, y + h/2 + 1);
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // 테스트: 연속된 타일 배치
    drawProTile(50, 100, "10", "#e53e3e");
    drawProTile(100, 100, "11", "#e53e3e");
    drawProTile(150, 100, "12", "#e53e3e");
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
