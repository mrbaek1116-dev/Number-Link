<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LumiPuzzle - Ultimate Fixed</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; color: white; }
        canvas { display: block; }
        
        /* 하단 UI 바 */
        .ui-container { 
            position: absolute; bottom: 0; width: 100%; height: 70px; 
            background: #0b0d12; display: flex; justify-content: space-around; 
            align-items: center; z-index: 1000; border-top: 2px solid #2c3e50;
        }
        button { 
            padding: 10px 16px; font-size: 14px; background: #34495e; color: white; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-draw { 
            background: #d35400; width: 55px; height: 55px; border-radius: 50%; 
            font-size: 26px; border: 3px solid #e67e22; margin-top: -30px;
        }
        .btn-complete { background: #27ae60; border: 2px solid #fff; }

        #msg { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; z-index: 10; font-weight: bold; color: #ffeb3b; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="msg">루미큐브 규칙에 맞춰 타일을 놓으세요!</div>
<canvas id="gameCanvas"></canvas>

<div class="ui-container">
    <button onclick="sortHand('color')">색상별</button>
    <button onclick="sortHand('number')">숫자별</button>
    <button class="btn-draw" onclick="drawOneTile()">+</button>
    <button class="btn-complete" onclick="finishTurn()">조합 확정</button>
    <button onclick="resetGame()" style="background:#7f8c8d;">리셋</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgArea = document.getElementById('msg');
    
    let tiles = [];
    let pool = [];
    let draggingGroup = []; 
    let startX, startY;
    let hasRegistered30 = false;
    let UI_HEIGHT = 70;

    // 기기별 동적 수치
    let TILE_W, TILE_H, BOARD_TOP, RACK_Y, GRID_X, GRID_Y;

    function initMetrics() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 타일 크기 제한 (PC에서 너무 커지는 것 방지)
        let idealW = Math.floor(canvas.width / 14);
        TILE_W = Math.min(idealW, 55); // 최대 너비 55px 제한
        TILE_H = Math.floor(TILE_W * 1.35);
        
        BOARD_TOP = 60;
        GRID_X = TILE_W + 5;
        GRID_Y = TILE_H + 8;
        
        // 거치대 위치 (UI 위로 2단 확보)
        RACK_Y = canvas.height - UI_HEIGHT - (GRID_Y * 2) - 20;
        
        reorderRack();
    }

    window.addEventListener('resize', () => { initMetrics(); render(); });

    function resetGame() {
        tiles = []; pool = []; hasRegistered30 = false;
        const colors = ['#3498db', '#e74c3c', '#f1c40f', '#ecf0f1']; // 파, 빨, 노, 흰
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 0, color: '#e74c3c', joker: 'color' });
        pool.push({ num: 0, color: '#3498db', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 14; i++) drawOneTile(true);
        initMetrics();
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        t.place = 'rack';
        t.isNew = true; // 새로 뽑은 타일 표시
        tiles.push(t);
        reorderRack();
        if(!isInit) render();
    }

    function reorderRack() {
        let rackTiles = tiles.filter(t => t.place === 'rack');
        const itemsPerRow = Math.floor((canvas.width - 20) / GRID_X);
        rackTiles.forEach((t, i) => {
            const row = Math.floor(i / itemsPerRow);
            const col = i % itemsPerRow;
            t.x = t.saveX = 10 + col * GRID_X;
            t.y = t.saveY = RACK_Y + row * GRID_Y;
        });
    }

    function sortHand(type) {
        let rackTiles = tiles.filter(t => t.place === 'rack');
        const colorOrder = ['#3498db', '#e74c3c', '#f1c40f', '#ecf0f1'];
        if (type === 'color') {
            rackTiles.sort((a, b) => a.joker ? 1 : b.joker ? -1 : a.color !== b.color ? colorOrder.indexOf(a.color) - colorOrder.indexOf(b.color) : a.num - b.num);
        } else {
            rackTiles.sort((a, b) => a.joker ? 1 : b.joker ? -1 : a.num !== b.num ? a.num - b.num : colorOrder.indexOf(a.color) - colorOrder.indexOf(b.color));
        }
        reorderRack();
        render();
    }

    function drawTileUI(ctx, t, isDrag) {
        const r = 5;
        // 타일 본체
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(t.x, t.y, TILE_W, TILE_H, r); ctx.fill();
        // 테두리
        ctx.strokeStyle = isDrag ? "#3498db" : "#bdc3c7";
        ctx.lineWidth = isDrag ? 3 : 1;
        ctx.stroke();

        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillStyle = t.color;
        if (t.joker) {
            ctx.font = `${TILE_W*0.6}px Arial`; ctx.fillText("🤡", t.x + TILE_W/2, t.y + TILE_H/2);
        } else {
            ctx.font = `bold ${TILE_W*0.5}px sans-serif`; ctx.fillText(t.num, t.x + TILE_W/2, t.y + TILE_H/2);
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 보드 영역 배경
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.fillRect(0, BOARD_TOP, canvas.width, RACK_Y - BOARD_TOP - 10);

        // 거치대 영역 배경
        ctx.fillStyle = "#d35400";
        ctx.fillRect(0, RACK_Y - 10, canvas.width, canvas.height - RACK_Y - UI_HEIGHT + 10);

        tiles.filter(t => !draggingGroup.includes(t)).forEach(tile => drawTileUI(ctx, tile, false));
        draggingGroup.forEach(tile => drawTileUI(ctx, tile, true));
    }

    function getConnectedTiles(startTile, clickX) {
        const relX = clickX - startTile.x;
        if (relX > TILE_W * 0.25 && relX < TILE_W * 0.75) return [startTile];

        let connected = [startTile];
        let queue = [startTile];
        while(queue.length > 0) {
            let curr = queue.shift();
            tiles.forEach(t => {
                if (t.place === startTile.place && !connected.includes(t)) {
                    if (Math.abs(t.y - curr.y) < 10 && Math.abs(Math.abs(t.x - curr.x) - GRID_X) < 10) {
                        connected.push(t); queue.push(t);
                    }
                }
            });
        }
        return connected.sort((a,b) => a.x - b.x);
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        if (y > canvas.height - UI_HEIGHT) return;

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                startX = x; startY = y;
                draggingGroup = getConnectedTiles(t, x);
                draggingGroup.forEach(dt => {
                    tiles.push(tiles.splice(tiles.indexOf(dt), 1)[0]);
                    dt.initX = dt.x; dt.initY = dt.y;
                });
                render(); break;
            }
        }
    }

    function onMove(e) {
        if (draggingGroup.length === 0) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingGroup.forEach(t => { 
            t.x = t.initX + (ev.clientX - startX); 
            t.y = t.initY + (ev.clientY - startY); 
        });
        render();
    }

    function onEnd() {
        if (draggingGroup.length === 0) return;
        let master = draggingGroup[0];
        let mX, mY, p;

        if (master.y < RACK_Y - 20) {
            mX = Math.round((master.x - 10) / GRID_X) * GRID_X + 10;
            mY = Math.round((master.y - BOARD_TOP) / GRID_Y) * GRID_Y + BOARD_TOP;
            p = 'board';
        } else {
            let row = Math.round((master.y - RACK_Y) / GRID_Y);
            mX = Math.round((master.x - 10) / GRID_X) * GRID_X + 10;
            mY = RACK_Y + Math.max(0, Math.min(row, 1)) * GRID_Y;
            p = 'rack';
        }

        draggingGroup.forEach((t, i) => {
            t.x = mX + (i * GRID_X);
            t.y = mY;
            t.place = p;
        });
        draggingGroup = []; render();
    }

    // --- 💡 철저한 루미큐브 검증 엔진 ---
    function validate(group) {
        if (group.length < 3) return { ok: false }; // 3장 미만 무조건 실패
        
        const g = [...group].sort((a,b) => a.x - b.x);
        const reals = g.filter(t => !t.joker);
        if (reals.length === 0) return { ok: true, score: 30 }; // 조커뭉치(특수케이스)

        const isRun = reals.every(t => t.color === reals[0].color); // 같은 색
        const isSet = reals.every(t => t.num === reals[0].num); // 같은 숫자

        if (isRun) {
            let firstRealIdx = g.findIndex(t => !t.joker);
            let startValue = g[firstRealIdx].num - firstRealIdx;
            for(let i=0; i<g.length; i++) {
                let expect = startValue + i;
                if (expect < 1 || expect > 13) return { ok: false };
                if (!g[i].joker && g[i].num !== expect) return { ok: false };
            }
            let score = (startValue + startValue + g.length - 1) * g.length / 2;
            return { ok: true, score: score };
        }
        
        if (isSet) {
            if (g.length > 4) return { ok: false };
            const colorsSeen = new Set();
            for (let t of reals) {
                if (colorsSeen.has(t.color)) return { ok: false }; // 같은 색 중복 안됨
                colorsSeen.add(t.color);
            }
            return { ok: true, score: reals[0].num * g.length };
        }
        return { ok: false };
    }

    function finishTurn() {
        const boardTiles = tiles.filter(t => t.place === 'board');
        if (boardTiles.length === 0) {
            msgArea.innerText = "보드에 타일이 없습니다.";
            return;
        }

        // 보드 위의 모든 그룹 추출
        boardTiles.sort((a,b) => a.y === b.y ? a.x - b.x : a.y - b.y);
        let groups = [], cur = [];
        for (let i=0; i<boardTiles.length; i++) {
            let t = boardTiles[i];
            if (cur.length > 0) {
                let last = cur[cur.length-1];
                if (t.y !== last.y || Math.abs(t.x - (last.x + GRID_X)) > 10) {
                    groups.push(cur); cur = [];
                }
            }
            cur.push(t);
        }
        if (cur.length > 0) groups.push(cur);

        let turnScore = 0;
        for (let g of groups) {
            let res = validate(g);
            if (!res.ok) {
                failAction("조합이 규칙에 맞지 않습니다! (3장 미만 혹은 잘못된 배열)");
                return;
            }
            turnScore += res.score;
        }

        if (!hasRegistered30) {
            if (turnScore < 30) {
                failAction(`첫 등록은 30점 이상이어야 합니다! (현재 ${turnScore}점)`);
                return;
            }
            hasRegistered30 = true;
        }

        // 확정 성공
        tiles.forEach(t => { t.saveX = t.x; t.saveY = t.y; });
        msgArea.innerText = "✅ 조합 확정 성공!";
        render();
    }

    function failAction(reason) {
        msgArea.innerText = "❌ " + reason;
        // 회수 로직: 이전 saveX, saveY로 복구
        tiles.forEach(t => { 
            t.x = t.saveX; 
            t.y = t.saveY; 
            if (t.y >= RACK_Y - 20) t.place = 'rack';
            else t.place = 'board';
        });
        setTimeout(render, 600);
    }

    initMetrics();
    resetGame();
    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
    window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive: false});
    window.addEventListener('touchend', onEnd);
</script>
</body>
</html>
