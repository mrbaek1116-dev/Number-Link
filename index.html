<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - 3D Hex</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: 'Arial Rounded MT Bold', 'Helvetica Round', sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; flex-wrap: wrap; }
        button { 
            padding: 10px 15px; font-size: 14px; background: #2c3e50; color: white; 
            border: 2px solid #34495e; border-radius: 12px; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        button:active { background: #34495e; }
        .btn-check { background: #e67e22; border-color: #d35400; }
        .btn-check:active { background: #d35400; }
        .btn-sort { background: #2980b9; border-color: #3498db; }
        .btn-sort:active { background: #3498db; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: Step 7 3D Hex</h3>
    <p style="margin:5px; font-size:12px; color:#ddd;">대각선 아래 입체감 Hex 타일 적용</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋 (42장)</button>
    <button class="btn-sort" onclick="sortTiles()">색상 정렬</button>
    <button class="btn-check" onclick="checkBoardRules()">조합 확인</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 55; 
    const TILE_W = 46, TILE_H = 60;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22']; 

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = [];
        const startY = 80;
        for (let i = 0; i < 42; i++) {
            tiles.push({
                x: 15 + (i % 6) * 62,
                y: startY + Math.floor(i / 6) * 75,
                num: Math.floor(Math.random() * 13) + 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        render();
    }

    function sortTiles() {
        tiles.sort((a, b) => {
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        const startY = 80;
        tiles.forEach((t, i) => {
            t.x = 15 + (i % 6) * 62;
            t.y = startY + Math.floor(i / 6) * 75;
        });
        render();
    }

    // 규칙 검증 엔진 (기존과 동일)
    function checkBoardRules() {
        const groups = findGroups();
        if (groups.length === 0) { alert("가로로 3장 이상 붙여주세요!"); return; }
        let msg = "";
        groups.forEach((group, i) => {
            const result = validateGroup(group);
            if (result) {
                msg += `조합 ${i+1}: ${result === "RUN" ? "연속 성공! ✅" : "그룹 성공! ✅"}\n`;
            } else {
                msg += `조합 ${i+1}: 규칙 위반 ❌ (숫자/색상 중복 체크)\n`;
            }
        });
        alert(msg);
    }

    function findGroups() {
        const foundGroups = [];
        const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);

        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]];
            visited.add(i);
            let current = sortedTiles[i];
            let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_SIZE - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 18 && dy < 12) {
                        group.push(sortedTiles[j]);
                        visited.add(j);
                        current = sortedTiles[j];
                        foundNext = true;
                        break;
                    }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    function validateGroup(group) {
        group.sort((a, b) => a.num - b.num);
        const sameColor = group.every(t => t.color === group[0].color);
        const nums = group.map(t => t.num);
        const isSeq = nums.every((n, i) => i === 0 || n === nums[i-1] + 1);
        if (sameColor && isSeq) return "RUN";
        const sameNum = group.every(t => t.num === group[0].num);
        const diffCols = new Set(group.map(t => t.color)).size === group.length;
        if (sameNum && diffCols && group.length <= 4) return "GROUP";
        return null;
    }
