<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Test Mode</title>
    <style>
        body { margin: 0; background: #000; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 10; flex-wrap: wrap; }
        button { 
            padding: 10px 15px; font-size: 14px; background: #333; color: white; 
            border: 2px solid #555; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-check { background: #e67e22; border-color: #d35400; }
        .btn-sort { background: #2980b9; border-color: #3498db; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: 테스트 모드 (42장)</h3>
    <p style="margin:5px; font-size:12px; color:#00ff00;">[색상 정렬]을 누르면 조합 찾기가 쉽습니다!</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">타일 리셋 (42장)</button>
    <button class="btn-sort" onclick="sortTiles()">색상 정렬</button>
    <button class="btn-check" onclick="checkBoardRules()">조합 확인</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 55; 
    const TILE_W = 46, TILE_H = 60;
    const colors = ['#FF3B30', '#FFCC00', '#007AFF', '#FF9500']; // 빨, 노, 파, 주

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    // 타일을 42장 생성 (테스트용)
    function drawInitialTiles() {
        tiles = [];
        for (let i = 0; i < 42; i++) {
            tiles.push({
                x: 10 + (i % 6) * 60,
                y: canvas.height - 450 + Math.floor(i / 6) * 65,
                num: Math.floor(Math.random() * 13) + 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        render();
    }

    // 색상별 -> 숫자별 정렬 기능
    function sortTiles() {
        tiles.sort((a, b) => {
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        
        const startY = canvas.height - 450;
        tiles.forEach((t, i) => {
            t.x = 10 + (i % 6) * 60;
            t.y = startY + Math.floor(i / 6) * 65;
        });
        render();
    }

    function checkBoardRules() {
        const groups = findGroups();
        if (groups.length === 0) {
            alert("가로로 3장 이상 붙여주세요!");
            return;
        }
        let msg = "";
        groups.forEach((group, i) => {
            const result = validateGroup(group);
            msg += `조합 ${i+1}: ${result ? (result === "RUN" ? "연속 성공! ✅" : "그룹 성공! ✅") : "규칙 위반 ❌"}\n`;
        });
        alert(msg);
    }

    function findGroups() {
        const foundGroups = [];
        const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);

        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]];
            visited.add(i);

            let current = sortedTiles[i];
            let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_SIZE - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 15 && dy < 10) {
                        group.push(sortedTiles[j]);
                        visited.add(j);
                        current = sortedTiles[j];
                        foundNext = true;
                        break;
                    }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    function validateGroup(group) {
        group.sort((a, b) => a.num - b.num);
        const sameColor = group.every(t => t.color === group[0].color);
        const nums = group.map(t => t.num);
        const isSeq = nums.every((n, i) => i === 0 || n === nums[i-1] + 1);
        if (sameColor && isSeq) return "RUN";

        const sameNum = group.every(t => t.num === group[0].num);
        const diffCols = new Set(group.map(t => t.color)).size === group.length;
        if (sameNum && diffCols) return "GROUP";
        return null;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "#222";
        for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        tiles.forEach(tile => {
            ctx.fillStyle = "#F5F5F5";
            ctx.beginPath(); ctx.roundRect(tile.x, tile.y, TILE_W, TILE_H, 4); ctx.fill();
            ctx.strokeStyle = (draggingTile === tile) ? "#FFCC00" : "#888";
            ctx.lineWidth = (draggingTile === tile) ? 3 : 1;
            ctx.stroke();

            ctx.fillStyle = tile.color;
            ctx.font = "bold 22px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            draggingTile.x = Math.floor(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.floor(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null;
        render();
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
