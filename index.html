<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Fix & Protect</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; color: white; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        button { padding: 12px 20px; font-size: 14px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-complete { background: #27ae60; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #msg { margin: 5px; font-size: 14px; color: #ffeb3b; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run</h3>
    <p id="msg">타일을 조합하여 보드에 올리세요.</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="resetGame()">리셋</button>
    <button onclick="drawOneTile()" style="background:#8e44ad;">타일 뽑기</button>
    <button onclick="sortHand()">정렬</button>
    <button class="btn-complete" onclick="finishTurn()">조합 확정</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgArea = document.getElementById('msg');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;
    let hasRegistered30 = false; // 30점 룰 통과 여부

    const TILE_W = 46, TILE_H = 62;
    const RACK_GRID_X = 54, RACK_GRID_Y = 80;
    const BOARD_GRID_X = 50, BOARD_GRID_Y = 70;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    const RACK_ROWS = 3;
    const BOARD_TOP = 60;

    let rackY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        rackY = canvas.height - (RACK_GRID_Y * RACK_ROWS) - 100;
        render();
    }
    window.addEventListener('resize', resize);

    function resetGame() {
        tiles = []; pool = []; hasRegistered30 = false;
        showMessage("게임 시작! 첫 등록은 합계 30점 이상이어야 합니다.");
        
        // 106장 생성
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        // 조커 확실히 구분 (컬러/흑백)
        pool.push({ num: 0, color: '#ff3399', joker: 'color' });
        pool.push({ num: 0, color: '#555555', joker: 'bw' });
        
        pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 14; i++) drawOneTile(true);
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        const pos = findEmptyRackSlot();
        t.x = t.originRackX = pos.x;
        t.y = t.originRackY = pos.y;
        t.place = 'rack';
        t.isFixed = false; // 아직 확정되지 않은 상태
        tiles.push(t);
        if(!isInit) { showMessage("타일을 뽑았습니다."); render(); }
    }

    function findEmptyRackSlot() {
        const cols = Math.floor((canvas.width - 30) / RACK_GRID_X);
        for (let r = 0; r < RACK_ROWS; r++) {
            for (let c = 0; c < cols; c++) {
                let tx = 20 + c * RACK_GRID_X;
                let ty = rackY + r * RACK_GRID_Y;
                if (!tiles.some(t => t.place === 'rack' && Math.abs(t.x - tx) < 5 && Math.abs(t.y - ty) < 5)) return { x: tx, y: ty };
            }
        }
        return { x: 20, y: rackY };
    }

    function sortHand() {
        let rackTiles = tiles.filter(t => t.place === 'rack');
        rackTiles.sort((a, b) => a.color !== b.color ? colors.indexOf(a.color) - colors.indexOf(b.color) : a.num - b.num);
        const cols = Math.floor((canvas.width - 30) / RACK_GRID_X);
        rackTiles.forEach((t, i) => {
            t.x = t.originRackX = 20 + (i % cols) * RACK_GRID_X;
            t.y = t.originRackY = rackY + Math.floor(i / cols) * RACK_GRID_Y;
        });
        render();
    }

    function drawTileUI(ctx, t, isDrag) {
        const depth = 4, r = 7;
        ctx.fillStyle = "#bdc3c7";
        ctx.beginPath(); ctx.roundRect(t.x + depth, t.y + depth, TILE_W, TILE_H, r); ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(t.x, t.y, TILE_W, TILE_H, r); ctx.fill();
        
        // 보드에 고정된 타일은 테두리 강조 생략, 드래그나 새로 올린 타일만 강조
        ctx.strokeStyle = isDrag ? "#3498db" : (t.place === 'board' && !t.isFixed ? "#f1c40f" : "#d1d8e0");
        ctx.lineWidth = isDrag ? 3 : 2;
        ctx.stroke();

        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        if (t.joker) {
            // 조커 색상 로직: 생성 시 지정된 t.color 사용
            ctx.fillStyle = t.color;
            ctx.font = "bold 28px Arial";
            ctx.fillText("🤡", t.x + TILE_W/2, t.y + TILE_H/2 + 2);
        } else {
            ctx.fillStyle = t.color;
            ctx.font = `bold ${t.num > 9 ? "22px" : "26px"} Arial`;
            ctx.fillText(t.num, t.x + TILE_W/2, t.y + TILE_H/2 + 2);
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // 보드 가이드
        ctx.fillStyle = "rgba(255,255,255,0.02)";
        ctx.fillRect(10, BOARD_TOP, canvas.width - 20, rackY - BOARD_TOP - 20);
        // 거치대 영역
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        for(let i=0; i<RACK_ROWS; i++) {
            ctx.beginPath(); ctx.roundRect(10, rackY + (i * RACK_GRID_Y) - 5, canvas.width - 20, TILE_H + 10, 10); ctx.fill();
        }
        tiles.filter(t => t !== draggingTile).forEach(tile => drawTileUI(ctx, tile, false));
        if(draggingTile) drawTileUI(ctx, draggingTile, true);
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                // 이미 고정된(isFixed) 타일도 일단 드래그는 가능하게 함 (15단계 재조합 준비)
                draggingTile = t; offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]); render(); break;
            }
        }
    }

    function onMove(e) { if (!draggingTile) return; const ev = e.touches ? e.touches[0] : e; draggingTile.x = ev.clientX - offsetX; draggingTile.y = ev.clientY - offsetY; render(); }

    function onEnd() {
        if (!draggingTile) return;
        if (draggingTile.y < rackY - 20) {
            // 보드 드롭
            draggingTile.x = Math.round((draggingTile.x - 10) / BOARD_GRID_X) * BOARD_GRID_X + 10;
            draggingTile.y = Math.round((draggingTile.y - BOARD_TOP) / BOARD_GRID_Y) * BOARD_GRID_Y + BOARD_TOP;
            draggingTile.place = 'board';
        } else {
            // 거치대 드롭
            let row = Math.max(0, Math.min(Math.round((draggingTile.y - rackY) / RACK_GRID_Y), RACK_ROWS-1));
            draggingTile.x = Math.round((draggingTile.x - 20) / RACK_GRID_X) * RACK_GRID_X + 20;
            draggingTile.y = rackY + row * RACK_GRID_Y;
            draggingTile.place = 'rack';
            // 거치대로 돌아오면 origin 갱신 (거치대 내 이동 허용)
            draggingTile.originRackX = draggingTile.x;
            draggingTile.originRackY = draggingTile.y;
        }
        draggingTile = null; render();
    }

    function finishTurn() {
        const currentBoardTiles = tiles.filter(t => t.place === 'board');
        if (currentBoardTiles.length === 0) return;

        // [핵심] 이번 턴에 새로 낸 타일들만 체크하기 위한 로직 (실제로는 보드 전체 검사)
        const groups = getGroups(currentBoardTiles);
        if (!groups) { failTurn("모든 타일은 3장 이상 연결되어야 합니다."); return; }

        let turnScore = 0;
        let valid = true;
        groups.forEach(g => {
            const res = validate(g);
            if (!res.ok) valid = false;
            turnScore += res.score;
        });

        if (!valid) { failTurn("규칙에 맞지 않는 조합이 있습니다."); return; }

        if (!hasRegistered30) {
            if (turnScore < 30) { failTurn(`첫 등록은 30점 이상이어야 합니다. (현재 ${turnScore}점)`); return; }
            hasRegistered30 = true;
        }

        // 성공: 보드 위 모든 타일을 '고정' 상태로 변경 (보호막)
        currentBoardTiles.forEach(t => { t.isFixed = true; });
        showMessage("조합 확정 성공!");
        render();
    }

    function failTurn(reason) {
        showMessage("❌ " + reason);
        // [핵심 수정] isFixed가 false인(이번 턴에 새로 낸) 타일만 회수
        tiles.forEach(t => {
            if (t.place === 'board' && !t.isFixed) {
                t.x = t.originRackX; t.y = t.originRackY; t.place = 'rack';
            }
        });
        setTimeout(render, 600);
    }

    function getGroups(boardTiles) {
        boardTiles.sort((a, b) => a.y === b.y ? a.x - b.x : a.y - b.y);
        let groups = [], cur = [];
        for (let t of boardTiles) {
            if (cur.length > 0 && (t.y !== cur[0].y || t.x !== cur[cur.length-1].x + BOARD_GRID_X)) {
                if (cur.length < 3) return null;
                groups.push(cur); cur = [];
            }
            cur.push(t);
        }
        if (cur.length > 0) { if (cur.length < 3) return null; groups.push(cur); }
        return groups;
    }

    function validate(group) {
        const reals = group.filter(t => !t.joker);
        if (reals.length === 0) return { ok: true, score: 30 };
        const isRun = reals.every(t => t.color === reals[0].color);
        const isGroup = reals.every(t => t.num === reals[0].num);
        let score = 0;
        reals.forEach(t => score += t.num);
        // 조커 점수 추정 (간소화)
        group.forEach(t => { if(t.joker) score += (reals[0].num || 10); });
        return { ok: isRun || isGroup, score: score };
    }

    function showMessage(m) { msgArea.innerText = m; }

    canvas.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
    resize(); resetGame();
</script>
</body>
</html>
