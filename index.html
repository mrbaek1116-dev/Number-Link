<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Font Size Fix</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        button { padding: 10px 18px; font-size: 14px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:active { background: #2c3e50; }
        .btn-complete { background: #27ae60; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run</h3>
    <p id="msg" style="margin:5px; font-size:12px; color:#aaa;">타일을 거치대 위에 정렬하세요.</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="resetGame()">리셋</button>
    <button onclick="drawOneTile()" style="background:#8e44ad;">타일 뽑기</button>
    <button onclick="sortHand()">정렬</button>
    <button class="btn-complete" onclick="submitRegistration()">조합 등록</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;
    let hasRegistered30 = false;

    // 설정값
    const TILE_W = 46, TILE_H = 62;
    const GRID_X = 54, GRID_Y = 80;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    const RACK_ROWS = 3;

    let rackY; // 거치대 시작 높이

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        rackY = canvas.height - (GRID_Y * RACK_ROWS) - 100;
        render();
    }
    window.addEventListener('resize', resize);

    function resetGame() {
        tiles = []; pool = []; hasRegistered30 = false;
        // 106장 덱 생성
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        // 조커: 하나는 컬러, 하나는 흑백
        pool.push({ num: 0, color: '#ff3399', joker: 'color' });
        pool.push({ num: 0, color: '#555555', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 14; i++) drawOneTile(true);
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        const pos = findEmptySlot();
        t.x = pos.x;
        t.y = pos.y;
        tiles.push(t);
        if(!isInit) render();
    }

    // 빈 슬롯 계산 (겹침 방지)
    function findEmptySlot() {
        const cols = Math.floor((canvas.width - 40) / GRID_X);
        for (let r = 0; r < RACK_ROWS; r++) {
            for (let c = 0; c < cols; c++) {
                let tx = 20 + c * GRID_X;
                let ty = rackY + r * GRID_Y;
                if (!tiles.some(t => Math.abs(t.x - tx) < 10 && Math.abs(t.y - ty) < 10)) {
                    return { x: tx, y: ty };
                }
            }
        }
        return { x: 20, y: rackY };
    }

    function sortHand() {
        tiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        const cols = Math.floor((canvas.width - 40) / GRID_X);
        tiles.forEach((t, i) => {
            t.x = 20 + (i % cols) * GRID_X;
            t.y = rackY + Math.floor(i / cols) * GRID_Y;
        });
        render();
    }

    // --- 문제 해결의 핵심: 중앙 정렬 & 가변 글꼴 ---
    function drawTileUI(ctx, t, isDrag) {
        const depth = 4, r = 7;
        
        // 두께
        ctx.fillStyle = "#bdc3c7";
        ctx.beginPath(); ctx.roundRect(t.x + depth, t.y + depth, TILE_W, TILE_H, r); ctx.fill();
        
        // 앞면
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(t.x, t.y, TILE_W, TILE_H, r); ctx.fill();
        ctx.strokeStyle = isDrag ? "#3498db" : "#d1d8e0"; ctx.lineWidth = isDrag ? 3 : 1; ctx.stroke();

        // 내용물 그리기
        if (t.joker) {
            // [해결 1] 조커 색상 지정 (핑크, 회색)
            ctx.fillStyle = (t.joker === 'bw') ? "#555555" : "#ff3399";
            ctx.font = "28px Arial"; ctx.textAlign = "center";
            ctx.fillText("🤡", t.x + TILE_W/2, t.y + TILE_H/2 + 9);
        } else {
            ctx.fillStyle = t.color;
            ctx.textAlign = "center"; ctx.textBaseline = "middle"; // [핵심] Y축 베이스라인을 중앙으로 고정

            // [해결 2] 가변 글꼴 로직 (모두 크게)
            // 한 자릿수든 두 자릿수든 최대한 크게 중앙에 배치합니다.
            const fontSize = (t.num > 9) ? "22px" : "26px"; // 두 자릿수는 타일 밖으로 튀지 않게 미세하게 조정
            ctx.font = `bold ${fontSize} 'Arial Rounded MT Bold', sans-serif`;
            
            // [핵심] Y축 위치 미세 조정 (가독성 향상)
            // 한 자릿수는 베이스라인 중앙 설정 시 약간 위로 치우치므로, 
            // 시각적 중앙을 맞추기 위해 Y축에 오프셋을 줍니다.
            const yOffset = (t.num < 10) ? 2 : 1;
            ctx.fillText(t.num, t.x + TILE_W/2, t.y + TILE_H/2 + yOffset);
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 3단 개인 거치대(Rack) 디자인
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.shadowColor = "rgba(0,0,0,0.1)"; ctx.shadowBlur = 10;
        for(let i=0; i<RACK_ROWS; i++) {
            ctx.beginPath();
            ctx.roundRect(10, rackY + (i * GRID_Y) - 5, canvas.width - 20, TILE_H + 10, 10);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        tiles.filter(t => t !== draggingTile).forEach(tile => drawTileUI(ctx, tile, false));
        if(draggingTile) drawTileUI(ctx, draggingTile, true);
    }

    // (이벤트 로직은 이전과 동일하되 스냅 기능 보강)
    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t; offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]); render(); break;
            }
        }
    }
    function onMove(e) { if (!draggingTile) return; const ev = e.touches ? e.touches[0] : e; draggingTile.x = ev.clientX - offsetX; draggingTile.y = ev.clientY - offsetY; render(); }
    function onEnd() {
        if (draggingTile) {
            // 그리드 스냅 계산
            let targetX = Math.round((draggingTile.x - 20) / GRID_X) * GRID_X + 20;
            let row = Math.round((draggingTile.y - rackY) / GRID_Y);
            row = Math.max(0, Math.min(row, RACK_ROWS - 1));
            let targetY = rackY + row * GRID_Y;

            // 겹침 처리: 목표 자리에 이미 타일이 있다면?
            const existingTile = tiles.find(t => t !== draggingTile && Math.abs(t.x - targetX) < 10 && Math.abs(t.y - targetY) < 10);
            
            if (existingTile) {
                // 원래 있던 위치로 되돌리기 (가장 가까운 빈 슬롯으로 보낼 수도 있음)
                draggingTile.x = targetX;
                draggingTile.y = targetY;
                
                // [보강] 겹침 시 시각적 표시 (밀어내기)
                tiles.forEach(t => {
                    if(t !== draggingTile && t.x === draggingTile.x && t.y === draggingTile.y) {
                        t.x += (draggingTile.x < canvas.width/2) ? GRID_X : -GRID_X; // 꽉 차지 않았을 때만 작동
                    }
                });
            } else {
                draggingTile.x = targetX;
                draggingTile.y = targetY;
            }
        }
        draggingTile = null; render();
    }

    // 판정 로직 (생략)
    function submitRegistration() { alert("가로로 3장 이상 붙여주세요."); }

    canvas.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
    window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive: false});
    window.addEventListener('touchend', onEnd);
    resize(); resetGame();
</script>
</body>
</html>
