<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Board System</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; }
        button { padding: 10px 15px; font-size: 13px; background: #2c3e50; color: white; border: 2px solid #34495e; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-complete { background: #27ae60; border-color: #2ecc71; }
        .btn-draw { background: #8e44ad; border-color: #9b59b6; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; color: #fff; pointer-events: none; }
        .pool-info { position: absolute; top: 10px; right: 20px; color: #f1c40f; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: 보드 공유 시스템</h3>
    <p style="font-size:11px; color:#aaa;">위쪽은 [보드], 아래쪽은 [내 손패] 영역입니다.</p>
</div>
<div class="pool-info" id="pool-display">더미: 0</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋</button>
    <button class="btn-draw" onclick="drawOneTile()">타일 뽑기</button>
    <button onclick="sortHand()">내 손패 정렬</button>
    <button class="btn-complete" onclick="submitToBoard()">조합 등록</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 60; 
    const TILE_W = 46, TILE_H = 60;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    
    // 영역 구분선 (화면 하단 30% 지점)
    let handLineY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        handLineY = canvas.height - 220; 
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = []; pool = [];
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 'J', color: 'color', joker: 'color' }, { num: 'J', color: 'bw', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < 14; i++) { drawOneTile(true); }
        render();
    }

    function drawOneTile(initial = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        // 손패 영역 내 빈 공간에 배치 (겹침 방지)
        const index = tiles.filter(tile => tile.y >= handLineY).length;
        t.x = 20 + (index % 6) * 60;
        t.y = handLineY + 20 + Math.floor(index / 6) * 75;
        tiles.push(t);
        if (!initial) { updatePoolDisplay(); render(); }
    }

    function updatePoolDisplay() { document.getElementById('pool-display').innerText = `더미: ${pool.length}`; }

    // 내 손패만 깔끔하게 정렬 (보드 위 타일은 건드리지 않음)
    function sortHand() {
        let handTiles = tiles.filter(t => t.y >= handLineY);
        let boardTiles = tiles.filter(t => t.y < handLineY);

        handTiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });

        handTiles.forEach((t, i) => {
            t.x = 20 + (i % 6) * 60;
            t.y = handLineY + 20 + Math.floor(i / 6) * 75;
        });

        tiles = [...boardTiles, ...handTiles];
        render();
    }

    function submitToBoard() {
        const groups = findGroups();
        if (groups.length === 0) { alert("3장 이상 붙여주세요!"); return; }
        
        let success = false;
        groups.forEach(group => {
            if (validateGroupWithJoker(group)) {
                // 성공한 타일들은 이제 '보드 타일'이 됨 (그대로 둠)
                success = true;
            } else {
                // 실패한 조합은 내 손패로 다시 튕겨내거나 경고
                alert("규칙에 맞지 않는 조합이 포함되어 있습니다.");
            }
        });
        if (success) render();
    }

    // --- 로직부 (이전과 동일하되 시각적 구분 추가) ---

    function drawHexTile(ctx, x, y, w, h, isDragging) {
        const r = 10; const d = 4;
        ctx.fillStyle = "#bdc3c7"; ctx.beginPath(); ctx.roundRect(x+d, y+d, w, h, r); ctx.fill(); // 입체
        ctx.fillStyle = "#ecf0f1"; ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill(); // 윗면
        ctx.strokeStyle = isDragging ? "#3498db" : "#95a5a6"; ctx.lineWidth = isDragging ? 3 : 1; ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 보드 구역과 손패 구역 구분선
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(0, handLineY); ctx.lineTo(canvas.width, handLineY); ctx.stroke();
        ctx.setLineDash([]);
        
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.fillText("BOARD (공유 영역)", 20, handLineY - 10);
        ctx.fillText("MY HAND (내 손패)", 20, handLineY + 20);

        tiles.forEach(tile => {
            drawHexTile(ctx, tile.x, tile.y, TILE_W, TILE_H, draggingTile === tile);
            if (tile.joker) drawClownJoker(ctx, tile.x, tile.y, TILE_W, TILE_H, tile.joker);
            else {
                ctx.fillStyle = tile.color; ctx.font = "bold 24px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
            }
        });
    }

    // 조커 그리기 및 규칙 판정 로직은 10단계와 동일 (생략 없이 포함됨)
    function drawClownJoker(ctx, x, y, w, h, type) {
        ctx.save(); ctx.translate(x + w / 2, y + h / 2);
        ctx.fillStyle = type === 'color' ? "#2c3e50" : "#555";
        ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(10, -5); ctx.lineTo(0, 15); ctx.lineTo(-10, -5); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(-4, -2, 2, 0, 7); ctx.arc(4, -2, 2, 0, 7); ctx.fill();
        ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(-7, 5); ctx.quadraticCurveTo(0, 12, 7, 5); ctx.stroke();
        ctx.restore();
    }

    function validateGroupWithJoker(group) {
        const jokerCount = group.filter(t => t.joker).length;
        const normalTiles = group.filter(t => !t.joker);
        if (normalTiles.length > 0) {
            const sameColor = normalTiles.every(t => t.color === normalTiles[0].color);
            if (sameColor) {
                const nums = normalTiles.map(t => t.num).sort((a, b) => a - b);
                let neededJokers = 0;
                for (let i = 1; i < nums.length; i++) neededJokers += nums[i] - nums[i - 1] - 1;
                if (neededJokers <= jokerCount) return "RUN";
            }
            const sameNum = normalTiles.every(t => t.num === normalTiles[0].num);
            const diffCols = new Set(normalTiles.map(t => t.color)).size === normalTiles.length;
            if (sameNum && diffCols && group.length <= 4) return "GROUP";
        } else if (jokerCount >= 3) return "RUN";
        return null;
    }

    function findGroups() {
        const foundGroups = []; const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);
        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]]; visited.add(i);
            let current = sortedTiles[i]; let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_SIZE - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 20 && dy < 15) { group.push(sortedTiles[j]); visited.add(j); current = sortedTiles[j]; foundNext = true; break; }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        if (y > canvas.height - 80) return;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t; offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]); render(); break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX; draggingTile.y = ev.clientY - offsetY; render();
    }
    function onEnd() {
        if (draggingTile) {
            draggingTile.x = Math.round(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.round(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null; render();
    }

    canvas.addEventListener('mousedown', onStart); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false}); window.addEventListener('touchmove', onMove, {passive: false}); window.addEventListener('touchend', onEnd);
    resize(); drawInitialTiles(); updatePoolDisplay();
</script>
</body>
</html>
