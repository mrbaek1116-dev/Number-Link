<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Phase 4.1 (Force Landscape & Smart Grid)</title>
    <style>
        body { margin: 0; background: #1a1e2a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = {
    rackTiles: [],
    draggingTile: null,
    savePos: { col: 0, row: 0 },
    offset: { x: 0, y: 0 },
    renderParams: {}
};

function updateLayout() {
    // 1. [강제 가로 시스템] 화면이 세로여도 가로 길이를 기준으로 좌표계 설정
    const isPortrait = window.innerHeight > window.innerWidth;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 실제 게임 가로 폭(W)과 세로 폭(H) 정의
    const gameW = canvas.width;
    const gameH = canvas.height;

    // 2. [스마트 그리드 알고리즘]
    const n = gameState.rackTiles.length;
    let cols = 10; // 기본 10칸
    let rows = 1;  // 기본 1줄

    if (n > 10 && n <= 20) {
        rows = 2; // 11~20개는 2줄
    } else if (n > 20) {
        rows = 2;
        cols = Math.ceil(n / 2); // 20개 넘으면 판이 옆으로 길어짐
    }

    const padding = 20;
    const gap = 4;
    // 판이 길어짐에 따라 타일 크기 자동 축소 (압축 형식)
    let tileW = Math.min(60, (gameW - padding * 2) / cols - gap);
    let tileH = tileW * 1.35;
    
    const rackW = cols * (tileW + gap) + 20;
    const rackH = rows * (tileH + gap) + 25;

    gameState.renderParams = {
        tileW, tileH, gap, rows, cols,
        rackX: (gameW - rackW) / 2,
        rackY: gameH - rackH - 10,
        rackW, rackH,
        fontSize: Math.floor(tileH * 0.5),
        depth: tileH * 0.1
    };

    // 위치 갱신
    gameState.rackTiles.forEach(tile => {
        if (tile !== gameState.draggingTile) snapToGrid(tile, tile.col, tile.row);
    });
}

function snapToGrid(tile, col, row) {
    const p = gameState.renderParams;
    tile.x = p.rackX + 10 + col * (p.tileW + p.gap);
    tile.y = p.rackY + 10 + row * (p.tileH + p.gap);
    tile.col = col; tile.row = row;
}

function draw4DTile(tile) {
    const p = gameState.renderParams;
    const { x, y, num, color } = tile;
    const r = 4;

    ctx.save();
    if (gameState.draggingTile === tile) {
        ctx.shadowBlur = 15; ctx.shadowOffsetY = 8; ctx.translate(-2, -2);
    } else {
        ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
    }
    ctx.shadowColor = "rgba(0,0,0,0.5)";

    // 측면
    ctx.fillStyle = "#cbd5e0";
    ctx.beginPath(); ctx.roundRect(x, y + p.depth, p.tileW, p.tileH, r); ctx.fill();
    // 윗면
    ctx.shadowBlur = 0;
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.roundRect(x, y, p.tileW, p.tileH, r); ctx.fill();
    // 숫자
    ctx.font = `bold ${p.fontSize}px Arial`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = color;
    ctx.fillText(num, x + p.tileW/2, y + p.tileH/2 + 1);
    ctx.restore();
}

function drawRack() {
    const p = gameState.renderParams;
    ctx.save();
    const grad = ctx.createLinearGradient(p.rackX, p.rackY, p.rackX, p.rackY + p.rackH);
    grad.addColorStop(0, "#d2b48c"); grad.addColorStop(1, "#8b4513");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(p.rackX, p.rackY, p.rackW, p.rackH, 8); ctx.fill();
    ctx.restore();
}

// 드래그 로직 (이전과 동일하나 콜백 시 그리드 체크 강화)
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
}

canvas.addEventListener('mousedown', (e) => {
    const pos = getPos(e);
    for (let i = gameState.rackTiles.length - 1; i >= 0; i--) {
        const t = gameState.rackTiles[i];
        if (pos.x >= t.x && pos.x <= t.x + gameState.renderParams.tileW && 
            pos.y >= t.y && pos.y <= t.y + gameState.renderParams.tileH) {
            gameState.draggingTile = t;
            gameState.savePos = { col: t.col, row: t.row };
            gameState.offset = { x: pos.x - t.x, y: pos.y - t.y };
            gameState.rackTiles.splice(i, 1);
            gameState.rackTiles.push(t);
            break;
        }
    }
});

window.addEventListener('mousemove', (e) => {
    if (!gameState.draggingTile) return;
    const pos = getPos(e);
    gameState.draggingTile.x = pos.x - gameState.offset.x;
    gameState.draggingTile.y = pos.y - gameState.offset.y;
});

window.addEventListener('mouseup', () => {
    if (!gameState.draggingTile) return;
    const t = gameState.draggingTile;
    const p = gameState.renderParams;
    const col = Math.round((t.x - (p.rackX + 10)) / (p.tileW + p.gap));
    const row = Math.round((t.y - (p.rackY + 10)) / (p.tileH + p.gap));
    const isOverlap = gameState.rackTiles.find(ot => ot !== t && ot.col === col && ot.row === row);

    if (col >= 0 && col < p.cols && row >= 0 && row < p.rows && !isOverlap) {
        snapToGrid(t, col, row);
    } else {
        snapToGrid(t, gameState.savePos.col, gameState.savePos.row);
    }
    gameState.draggingTile = null;
});

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, {passive: false});

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRack();
    gameState.rackTiles.forEach(draw4DTile);
    requestAnimationFrame(render);
}

// [테스트 세팅] 타일 22개 생성
const colors = ['#e53e3e', '#3182ce', '#ed8936', '#2d3748'];
for(let i=0; i<22; i++) {
    gameState.rackTiles.push({
        num: (i % 13) + 1, color: colors[i % 4],
        col: i % 11, row: Math.floor(i / 11) // 초기 11개씩 2줄 배치 테스트
    });
}

window.addEventListener('resize', updateLayout);
updateLayout();
render();
</script>
</body>
</html>
