<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Link - Strong Snap</title>
    <style>
        body { margin: 0; background: #2c3e50; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; background: #2c3e50; }
        .ui-panel { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { padding: 15px 20px; font-size: 16px; background: #e67e22; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; }
    </style>
</head>
<body>

<div class="info">
    <h2>자석 스냅 테스트</h2>
    <p>타일을 칸 근처에 놓으면 자동으로 붙습니다!</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-panel">
    <button onclick="drawInitialTiles()">타일 리셋</button>
    <button onclick="validateBoard()" style="background:#27ae60;">조합 검증</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#2c3e50'];
    const GRID_SIZE = 60; // 칸의 크기 (정렬의 기준)
    const TILE_W = 50, TILE_H = 65;

    function drawInitialTiles() {
        tiles = [];
        for (let i = 0; i < 14; i++) {
            tiles.push({
                x: 20 + (i % 5) * 65,
                y: canvas.height - 180 + Math.floor(i / 5) * 75,
                num: Math.floor(Math.random() * 13) + 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        render();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. 그리드(가이드 라인) 그리기
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height - 200); ctx.stroke();
        }
        for (let y = 0; y < canvas.height - 200; y += GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        // 2. 타일 그리기
        tiles.forEach(tile => {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.roundRect(tile.x, tile.y, TILE_W, TILE_H, 5);
            ctx.fill();
            
            // 테두리 (잡고 있을 때 강조)
            ctx.strokeStyle = (draggingTile === tile) ? "#e67e22" : "#95a5a6";
            ctx.lineWidth = (draggingTile === tile) ? 3 : 1;
            ctx.stroke();

            ctx.fillStyle = tile.color;
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2 + 8);
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                break;
            }
        }
    }

    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }

    function onEnd() {
        if (draggingTile) {
            // [강력한 스냅 로직]
            // 현재 위치에서 가장 가까운 그리드(칸) 좌표로 보냅니다.
            draggingTile.x = Math.round(draggingTile.x / GRID_SIZE) * GRID_SIZE + 5;
            draggingTile.y = Math.round(draggingTile.y / GRID_SIZE) * GRID_SIZE + 5;
        }
        draggingTile = null;
        render();
    }

    function validateBoard() {
        alert("조합 검증 완료!\n부족한 타일이 있다면 [보험료 계산기]를 사용해 조커를 받으세요!");
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    drawInitialTiles();
</script>
</body>
</html>
