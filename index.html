<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Phase 4.2 (Clean Layout)</title>
    <style>
        body { margin: 0; background: #1a1e2a; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = {
    rackTiles: [],
    draggingTile: null,
    savePos: { col: 0, row: 0 },
    offset: { x: 0, y: 0 },
    renderParams: {}
};

function updateLayout() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const n = gameState.rackTiles.length;
    let cols = Math.max(10, n > 20 ? Math.ceil(n / 2) : 10);
    let rows = n > 10 ? 2 : 1;

    const padding = 20;
    const hGap = 4; // 가로 간격
    const vGap = 12; // 세로 간격 (위아래 겹침 방지를 위해 더 넓게 설정)

    let tileW = Math.min(55, (canvas.width - padding * 2) / cols - hGap);
    let tileH = tileW * 1.35;
    
    // 거치대 크기 계산 (타일이 들어갈 실제 공간 + 내부 여백)
    const rackW = cols * (tileW + hGap) + 20;
    const rackH = rows * (tileH + vGap) + 20;

    gameState.renderParams = {
        tileW, tileH, hGap, vGap, rows, cols,
        rackX: (canvas.width - rackW) / 2,
        rackY: canvas.height - rackH - 15,
        rackW, rackH,
        fontSize: Math.floor(tileH * 0.5),
        depth: tileH * 0.08
    };

    gameState.rackTiles.forEach(tile => {
        if (tile !== gameState.draggingTile) snapToGrid(tile, tile.col, tile.row);
    });
}

function snapToGrid(tile, col, row) {
    const p = gameState.renderParams;
    // 10px는 거치대 내부의 미세 여백
    tile.x = p.rackX + 10 + col * (p.tileW + p.hGap);
    tile.y = p.rackY + 10 + row * (p.tileH + p.vGap);
    tile.col = col; tile.row = row;
}

function draw4DTile(tile) {
    const p = gameState.renderParams;
    const { x, y, num, color } = tile;
    const r = 3;

    ctx.save();
    if (gameState.draggingTile === tile) {
        ctx.shadowBlur = 15; ctx.shadowOffsetY = 8; ctx.translate(-2, -2);
    } else {
        ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
    }
    ctx.shadowColor = "rgba(0,0,0,0.4)";

    // 옆면 (두께) - 위아래 겹침을 방지하기 위해 윗면보다 약간 작게 그리거나 간격 조절
    ctx.fillStyle = "#cbd5e0";
    ctx.beginPath(); ctx.roundRect(x, y + p.depth, p.tileW, p.tileH, r); ctx.fill();
    
    // 윗면
    ctx.shadowBlur = 0;
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.roundRect(x, y, p.tileW, p.tileH, r); ctx.fill();
    
    // 숫자
    ctx.font = `bold ${p.fontSize}px Arial`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = color;
    ctx.fillText(num, x + p.tileW/2, y + p.tileH/2 + 1);
    ctx.restore();
}

function drawRack() {
    const p = gameState.renderParams;
    ctx.save();
    const grad = ctx.createLinearGradient(p.rackX, p.rackY, p.rackX, p.rackY + p.rackH);
    grad.addColorStop(0, "#d2b48c"); grad.addColorStop(1, "#8b4513");
    ctx.fillStyle = grad;
    // 거치대 판 자체의 입체감 추가
    ctx.shadowBlur = 10; ctx.shadowColor = "black";
    ctx.beginPath(); ctx.roundRect(p.rackX, p.rackY, p.rackW, p.rackH, 8); ctx.fill();
    ctx.restore();
}

// 이벤트 로직
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - rect.left, y: cy - rect.top };
}

canvas.addEventListener('mousedown', (e) => {
    const pos = getPos(e);
    for (let i = gameState.rackTiles.length - 1; i >= 0; i--) {
        const t = gameState.rackTiles[i];
        if (pos.x >= t.x && pos.x <= t.x + gameState.renderParams.tileW && 
            pos.y >= t.y && pos.y <= t.y + gameState.renderParams.tileH) {
            gameState.draggingTile = t;
            gameState.savePos = { col: t.col, row: t.row };
            gameState.offset = { x: pos.x - t.x, y: pos.y - t.y };
            gameState.rackTiles.splice(i, 1);
            gameState.rackTiles.push(t);
            break;
        }
    }
});

window.addEventListener('mousemove', (e) => {
    if (!gameState.draggingTile) return;
    const pos = getPos(e);
    gameState.draggingTile.x = pos.x - gameState.offset.x;
    gameState.draggingTile.y = pos.y - gameState.offset.y;
});

window.addEventListener('mouseup', () => {
    if (!gameState.draggingTile) return;
    const t = gameState.draggingTile;
    const p = gameState.renderParams;
    const col = Math.round((t.x - (p.rackX + 10)) / (p.tileW + p.hGap));
    const row = Math.round((t.y - (p.rackY + 10)) / (p.tileH + p.vGap));
    const isOverlap = gameState.rackTiles.find(ot => ot !== t && ot.col === col && ot.row === row);

    if (col >= 0 && col < p.cols && row >= 0 && row < p.rows && !isOverlap) {
        snapToGrid(t, col, row);
    } else {
        snapToGrid(t, gameState.savePos.col, gameState.savePos.row);
    }
    gameState.draggingTile = null;
});

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, {passive: false});

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRack();
    gameState.rackTiles.forEach(draw4DTile);
    requestAnimationFrame(render);
}

// 테스트 데이터 (22개)
const colors = ['#e53e3e', '#3182ce', '#ed8936', '#2d3748'];
for(let i=0; i<22; i++) {
    gameState.rackTiles.push({
        num: (i % 13) + 1, color: colors[i % 4],
        col: i % 11, row: Math.floor(i / 11)
    });
}

window.addEventListener('resize', updateLayout);
updateLayout();
render();
</script>
</body>
</html>
