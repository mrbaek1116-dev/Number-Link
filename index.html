<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tile Run - Phase 4 (Landscape & Dynamic Rack)</title>
    <style>
        /* 가로 모드 최적화 */
        body { 
            margin: 0; background: #1a1e2a; overflow: hidden; 
            touch-action: none; user-select: none;
            display: flex; justify-content: center; align-items: center;
            width: 100vw; height: 100vh;
        }
        canvas { display: block; background: #1a1e2a; }
        
        /* 세로 모드 경고 (모바일용) */
        @media screen and (orientation: portrait) {
            #orientation-layer { display: flex !important; }
        }
        #orientation-layer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 30, 42, 0.95); z-index: 100;
            color: white; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="orientation-layer">
        <div style="font-size: 50px;">🔄</div>
        <p>기기를 가로로 돌려주세요!<br>가로 모드에서 최적화된 게임입니다.</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = {
    rackTiles: [],
    draggingTile: null,
    savePos: { x: 0, y: 0, row: 0, col: 0 },
    offset: { x: 0, y: 0 },
    renderParams: {},
    // 핵심: 타일 개수에 따라 가변적으로 변하는 설정
    currentCols: 20 
};

function updateLayout() {
    // 가로 모드 기준 화면 꽉 채우기
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    // 타일이 20개가 넘어가면 컬럼 수를 늘림
    const totalTiles = gameState.rackTiles.length;
    gameState.currentCols = Math.max(20, Math.ceil(totalTiles / 2)); 
    
    const cols = gameState.currentCols;
    const gap = 4;
    const padding = 20;

    // 화면 너비에 맞춰 타일 크기 계산 (가로가 길어지면 타일은 작아짐)
    const availableW = canvas.width - (padding * 2);
    const tileW = Math.min(55, (availableW - (cols - 1) * gap) / cols);
    const tileH = tileW * 1.35;

    const rackW = cols * tileW + (cols - 1) * gap + 20; // 판의 실제 너비
    const rackH = tileH * 2 + gap + 25;

    gameState.renderParams = {
        tileW, tileH, gap, padding,
        rackX: (canvas.width - rackW) / 2, // 판을 화면 중앙에
        rackY: canvas.height - rackH - 10,
        rackW, rackH,
        fontSize: Math.floor(tileH * 0.5),
        depth: tileH * 0.1
    };

    // 타일 위치 갱신
    gameState.rackTiles.forEach(tile => {
        if (tile !== gameState.draggingTile) {
            snapToGrid(tile, tile.col, tile.row);
        }
    });
}

function snapToGrid(tile, col, row) {
    const p = gameState.renderParams;
    tile.x = p.rackX + 10 + col * (p.tileW + p.gap);
    tile.y = p.rackY + 10 + row * (p.tileH + p.gap);
    tile.col = col;
    tile.row = row;
}

function drawRackPlate() {
    const p = gameState.renderParams;
    ctx.save();
    // 나무 판 디자인 (이미지 참고)
    const grad = ctx.createLinearGradient(p.rackX, p.rackY, p.rackX, p.rackY + p.rackH);
    grad.addColorStop(0, "#d2b48c"); 
    grad.addColorStop(0.5, "#a0522d");
    grad.addColorStop(1, "#5d2e0a");
    
    ctx.shadowColor = "black"; ctx.shadowBlur = 10;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(p.rackX, p.rackY, p.rackW, p.rackH, 8);
    ctx.fill();
    ctx.restore();
}

function drawTile(tile) {
    const p = gameState.renderParams;
    const { x, y, num, color } = tile;
    
    ctx.save();
    if (gameState.draggingTile === tile) {
        ctx.shadowBlur = 15; ctx.shadowOffsetY = 10;
    } else {
        ctx.shadowBlur = 3; ctx.shadowOffsetY = 2;
    }
    
    // 4D 효과 (옆면)
    ctx.fillStyle = "#cccccc";
    ctx.beginPath(); ctx.roundRect(x, y + p.depth, p.tileW, p.tileH, 4); ctx.fill();
    
    // 윗면
    ctx.shadowBlur = 0;
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.roundRect(x, y, p.tileW, p.tileH, 4); ctx.fill();
    
    // 숫자
    ctx.font = `bold ${p.fontSize}px Arial`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = color;
    ctx.fillText(num, x + p.tileW/2, y + p.tileH/2 + 2);
    ctx.restore();
}

// --- 이벤트 처리 (Phase 3와 동일하나 20칸 대응 추가) ---
function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

canvas.addEventListener('mousedown', (e) => {
    const pos = getPointerPos(e);
    const p = gameState.renderParams;
    for (let i = gameState.rackTiles.length - 1; i >= 0; i--) {
        const t = gameState.rackTiles[i];
        if (pos.x >= t.x && pos.x <= t.x + p.tileW && pos.y >= t.y && pos.y <= t.y + p.tileH) {
            gameState.draggingTile = t;
            gameState.savePos = { col: t.col, row: t.row };
            gameState.offset = { x: pos.x - t.x, y: pos.y - t.y };
            gameState.rackTiles.splice(i, 1);
            gameState.rackTiles.push(t);
            break;
        }
    }
});

window.addEventListener('mousemove', (e) => {
    if (!gameState.draggingTile) return;
    const pos = getPointerPos(e);
    gameState.draggingTile.x = pos.x - gameState.offset.x;
    gameState.draggingTile.y = pos.y - gameState.offset.y;
});

window.addEventListener('mouseup', () => {
    if (!gameState.draggingTile) return;
    const t = gameState.draggingTile;
    const p = gameState.renderParams;

    const col = Math.round((t.x - (p.rackX + 10)) / (p.tileW + p.gap));
    const row = Math.round((t.y - (p.rackY + 10)) / (p.tileH + p.gap));

    const isOverlap = gameState.rackTiles.find(ot => ot !== t && ot.col === col && ot.row === row);

    if (col >= 0 && col < gameState.currentCols && row >= 0 && row < 2 && !isOverlap) {
        snapToGrid(t, col, row);
    } else {
        snapToGrid(t, gameState.savePos.col, gameState.savePos.row);
    }
    gameState.draggingTile = null;
});

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRackPlate();
    gameState.rackTiles.forEach(drawTile);
    requestAnimationFrame(render);
}

// 테스트 데이터 (22개 생성 -> 판이 길어져야 함)
const colors = ['#e53e3e', '#3182ce', '#ed8936', '#2d3748'];
for(let i=0; i<22; i++) {
    gameState.rackTiles.push({
        num: (i % 13) + 1,
        color: colors[i % 4],
        col: i % 20, // 임시 배치
        row: Math.floor(i / 20)
    });
}

window.addEventListener('resize', updateLayout);
updateLayout();
render();
</script>
</body>
</html>
