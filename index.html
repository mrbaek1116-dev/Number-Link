<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Fix Alignment</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 100; padding-bottom: 5px; }
        button { padding: 10px 12px; font-size: 12px; background: #2c3e50; color: white; border: 1px solid #34495e; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-complete { background: #27ae60; }
        .btn-draw { background: #8e44ad; }
        .pool-info { position: absolute; top: 10px; right: 15px; color: #f1c40f; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div id="pool-display" class="pool-info">더미: 0</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋</button>
    <button class="btn-draw" onclick="drawOneTile()">타일 뽑기</button>
    <button onclick="sortHand()">정렬</button>
    <button class="btn-complete" onclick="submitToBoard()">조합 등록</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_X = 55; // 가로 칸 간격
    const GRID_Y = 70; // 세로 줄 간격
    const TILE_W = 46, TILE_H = 60;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    
    let handLineY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // 손패 영역 시작점 (전체 높이의 약 60% 지점)
        handLineY = canvas.height * 0.55; 
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = []; pool = [];
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 'J', color: 'color', joker: 'color' }, { num: 'J', color: 'bw', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < 14; i++) { drawOneTile(true); }
        updatePoolDisplay();
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        
        // 내 손패 영역의 타일 개수 파악
        const handTiles = tiles.filter(tile => tile.y >= handLineY);
        const idx = handTiles.length;
        
        // 가로 6개씩 자동 줄바꿈 배치
        t.x = 10 + (idx % 6) * GRID_X;
        t.y = handLineY + 30 + Math.floor(idx / 6) * GRID_Y;
        
        tiles.push(t);
        if(!isInit) { updatePoolDisplay(); render(); }
    }

    function updatePoolDisplay() { document.getElementById('pool-display').innerText = `더미: ${pool.length}`; }

    function sortHand() {
        let handTiles = tiles.filter(t => t.y >= handLineY);
        let boardTiles = tiles.filter(t => t.y < handLineY);

        handTiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });

        handTiles.forEach((t, i) => {
            t.x = 10 + (i % 6) * GRID_X;
            t.y = handLineY + 30 + Math.floor(i / 6) * GRID_Y;
        });

        tiles = [...boardTiles, ...handTiles];
        render();
    }

    function submitToBoard() {
        const groups = findGroups();
        if (groups.length === 0) { alert("조합을 맞춰주세요."); return; }
        render();
    }

    function drawHexTile(ctx, x, y, w, h, isDragging) {
        const r = 8; const d = 4;
        // 그림자
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.roundRect(x+d, y+d, w, h, r); ctx.fill();
        // 몸체
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
        // 테두리
        ctx.strokeStyle = isDragging ? "#3498db" : "#bdc3c7";
        ctx.lineWidth = isDragging ? 3 : 1;
        ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 구분선
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.moveTo(0, handLineY); ctx.lineTo(canvas.width, handLineY); ctx.stroke();
        
        ctx.fillStyle = "#555";
        ctx.font = "12px Arial";
        ctx.fillText("BOARD", 10, handLineY - 10);
        ctx.fillText("MY HAND", 10, handLineY + 20);

        tiles.forEach(tile => {
            drawHexTile(ctx, tile.x, tile.y, TILE_W, TILE_H, draggingTile === tile);
            if (tile.joker) {
                // 단순화된 조커 표기
                ctx.fillStyle = tile.joker === 'color' ? "#e67e22" : "#7f8c8d";
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("J", tile.x + TILE_W/2, tile.y + TILE_H/2 + 7);
            } else {
                ctx.fillStyle = tile.color;
                ctx.font = "bold 24px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
            }
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        // 하단 버튼 영역 터치 차단
        if (y > canvas.height - 80) return;

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                render();
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            // 수평/수직 정렬 강제 (대각선 방지)
            draggingTile.x = Math.round(draggingTile.x / GRID_X) * GRID_X + 5;
            // 줄 간격에 맞춰 y좌표도 정렬
            const row = Math.round((draggingTile.y - (draggingTile.y >= handLineY ? handLineY + 30 : 20)) / GRID_Y);
            if (draggingTile.y >= handLineY) {
                draggingTile.y = handLineY + 30 + row * GRID_Y;
            } else {
                draggingTile.y = 20 + row * GRID_Y;
            }
        }
        draggingTile = null;
        render();
    }

    // 그룹 찾기 로직 등은 성능을 위해 간소화 유지
    function findGroups() {
        const foundGroups = []; const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);
        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]]; visited.add(i);
            let current = sortedTiles[i]; let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_X - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 10 && dy < 10) { group.push(sortedTiles[j]); visited.add(j); current = sortedTiles[j]; foundNext = true; break; }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
