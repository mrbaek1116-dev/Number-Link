<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Joker System</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        button { 
            padding: 12px 18px; font-size: 14px; background: #2c3e50; color: white; 
            border: 2px solid #34495e; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
        .btn-check { background: #e67e22; border-color: #d35400; }
        .btn-sort { background: #2980b9; border-color: #3498db; }
        .header { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run: 조커 시스템</h3>
    <p style="margin:5px; font-size:12px; color:#aaa;">컬러/흑백 조커 2장이 무작위로 섞여 나옵니다.</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋 (14장)</button>
    <button class="btn-sort" onclick="sortTiles()">숫자 정렬</button>
    <button class="btn-check" onclick="checkBoardRules()">조합 확인</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 65; 
    const TILE_W = 48, TILE_H = 64;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22']; // 빨, 노, 파, 주

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    // [8단계 수정] 106장 덱을 만들고 조커 2장을 섞어 14장을 배분
    function drawInitialTiles() {
        tiles = [];
        let fullDeck = [];
        // 1~13까지 색상별 2세트
        for (let i = 0; i < 2; i++) {
            colors.forEach(color => {
                for (let n = 1; n <= 13; n++) {
                    fullDeck.push({ num: n, color: color, joker: null });
                }
            });
        }
        // 조커 2장 추가
        fullDeck.push({ num: 'J', color: 'color', joker: 'color' }); // 컬러 조커
        fullDeck.push({ num: 'J', color: 'bw', joker: 'bw' });       // 흑백 조커

        // 셔플
        fullDeck.sort(() => Math.random() - 0.5);

        const startY = canvas.height - 350; 
        for (let i = 0; i < 14; i++) {
            let t = fullDeck[i];
            t.x = 30 + (i % 5) * 70;
            t.y = startY + Math.floor(i / 5) * 85;
            tiles.push(t);
        }
        render();
    }

    function sortTiles() {
        tiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.joker && b.joker) return 0;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });
        const startY = canvas.height - 350;
        tiles.forEach((t, i) => {
            t.x = 30 + (i % 5) * 70;
            t.y = startY + Math.floor(i / 5) * 85;
        });
        render();
    }

    function checkBoardRules() {
        const groups = findGroups();
        if (groups.length === 0) { alert("가로로 3장 이상 붙여주세요!"); return; }
        let msg = "";
        groups.forEach((group, i) => {
            const result = validateGroupWithJoker(group);
            msg += `조합 ${i+1}: ${result ? (result === "RUN" ? "연속 성공! ✅" : "그룹 성공! ✅") : "규칙 위반 ❌"}\n`;
        });
        alert(msg);
    }

    function findGroups() {
        const foundGroups = [];
        const visited = new Set();
        const sortedTiles = [...tiles].sort((a, b) => a.y - b.y || a.x - b.x);

        for (let i = 0; i < sortedTiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [sortedTiles[i]];
            visited.add(i);
            let current = sortedTiles[i];
            let foundNext = true;
            while (foundNext) {
                foundNext = false;
                for (let j = 0; j < sortedTiles.length; j++) {
                    if (visited.has(j)) continue;
                    const dx = Math.abs(current.x + GRID_SIZE - sortedTiles[j].x);
                    const dy = Math.abs(current.y - sortedTiles[j].y);
                    if (dx < 25 && dy < 15) {
                        group.push(sortedTiles[j]);
                        visited.add(j);
                        current = sortedTiles[j];
                        foundNext = true;
                        break;
                    }
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    // [8단계 핵심] 조커를 포함한 정밀 규칙 판정 엔진
    function validateGroupWithJoker(group) {
        const jokerCount = group.filter(t => t.joker).length;
        const normalTiles = group.filter(t => !t.joker);

        // 1. 연속 (Run) 판정
        // 조커를 제외한 타일들이 모두 같은 색상이어야 함
        if (normalTiles.length > 0) {
            const sameColor = normalTiles.every(t => t.color === normalTiles[0].color);
            if (sameColor) {
                // 숫자를 정렬하고 조커가 와야 할 자리에 있는지 체크
                const nums = normalTiles.map(t => t.num).sort((a, b) => a - b);
                let neededJokers = 0;
                for (let i = 1; i < nums.length; i++) {
                    neededJokers += nums[i] - nums[i - 1] - 1;
                }
                // 연속된 숫자를 만들기 위해 필요한 조커 개수가 가진 조커 개수보다 작거나 같아야 함
                if (neededJokers <= jokerCount) return "RUN";
            }
        } else if (jokerCount >= 3) {
            // 조커로만 이루어진 조합도 일단 연속으로 인정 (실제 게임 규칙에 따라 다름)
            return "RUN";
        }

        // 2. 그룹 (Group) 판정
        // 조커를 제외한 타일들이 모두 같은 숫자여야 함
        if (normalTiles.length > 0) {
            const sameNum = normalTiles.every(t => t.num === normalTiles[0].num);
            // 색상이 모두 달라야 함
            const cols = normalTiles.map(t => t.color);
            const diffCols = new Set(cols).size === cols.length;
            // 같은 숫자는 색상이 4개뿐이므로, 조커를 포함해 최대 4장까지만 가능
            if (sameNum && diffCols && group.length <= 4) return "GROUP";
        } else if (jokerCount >= 3) {
            return "GROUP";
        }

        return null;
    }

    // 조커 타일 그리기 전용 함수
    function drawJokerFace(ctx, x, y, w, h, type) {
        ctx.save();
        ctx.translate(x + w / 2, y + h / 2);
        
        // 얼굴 배경
        ctx.fillStyle = type === 'color' ? "#ecf0f1" : "#bdc3c7";
        ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.fill();

        // 눈 (컬러 조커는 무지개색, 흑백 조커는 회색)
        ctx.fillStyle = type === 'color' ? "#333" : "#555";
        ctx.beginPath(); ctx.arc(-7, -5, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(7, -5, 3, 0, Math.PI * 2); ctx.fill();

        // 웃는 입
        ctx.strokeStyle = type === 'color' ? "#e74c3c" : "#555";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 3, 10, 0.2 * Math.PI, 0.8 * Math.PI); ctx.stroke();
        
        ctx.restore();
    }

    function drawHexTile(ctx, x, y, w, h, isDragging) {
        const r = 10; 
        const d = 5; 

        ctx.fillStyle = "#bdc3c7"; 
        ctx.beginPath();
        ctx.roundRect(x + d, y + d, w, h, r);
        ctx.fill();

        ctx.fillStyle = "#ecf0f1"; 
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.fill();

        ctx.strokeStyle = isDragging ? "#3498db" : "#95a5a6";
        ctx.lineWidth = isDragging ? 3 : 1;
        ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for (let x = 0; x <= canvas.width; x += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
        for (let y = 0; y <= canvas.height; y += GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

        tiles.forEach(tile => {
            drawHexTile(ctx, tile.x, tile.y, TILE_W, TILE_H, draggingTile === tile);
            
            if (tile.joker) {
                // 조커 얼굴 그리기
                drawJokerFace(ctx, tile.x, tile.y, TILE_W, TILE_H, tile.joker);
            } else {
                // 일반 숫자 그리기
                ctx.fillStyle = tile.color;
                ctx.font = "bold 26px Arial Rounded MT Bold";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
            }
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        if (y > canvas.height - 100) return;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            draggingTile.x = Math.round(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.round(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null;
        render();
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
