<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Step 7</title>
    <style>
        body { margin: 0; background: #1a252f; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        button { 
            padding: 15px 25px; font-size: 16px; background: #34495e; color: white; 
            border: 2px solid #ecf0f1; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .btn-check { background: #27ae60; border-color: #2ecc71; }
        .header { position: absolute; top: 15px; width: 100%; text-align: center; color: white; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <h2 id="status">7단계: 규칙 판정 엔진</h2>
    <p>3장 이상 붙여놓고 '조합 확인'을 눌러보세요!</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">타일 리셋</button>
    <button class="btn-check" onclick="checkBoardRules()">조합 확인</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let draggingTile = null;
    let offsetX, offsetY;

    const GRID_SIZE = 60; 
    const TILE_W = 52, TILE_H = 68;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#ecf0f1']; // 빨, 노, 파, 흰

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = [];
        for (let i = 0; i < 14; i++) {
            tiles.push({
                x: 20 + (i % 5) * 65,
                y: canvas.height - 180 + Math.floor(i / 5) * 80,
                num: Math.floor(Math.random() * 13) + 1,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }
        render();
    }

    // [7단계 핵심] 규칙 검증 로직
    function checkBoardRules() {
        // 1. 붙어있는 타일들끼리 그룹 묶기
        const groups = findGroups();
        
        if (groups.length === 0) {
            alert("3장 이상 붙어있는 타일이 없습니다.");
            return;
        }

        let results = [];
        groups.forEach((group, index) => {
            const type = validateGroup(group);
            if (type === "RUN") results.push(`조합 ${index+1}: 연속(Run) 성공!`);
            else if (type === "GROUP") results.push(`조합 ${index+1}: 그룹(Group) 성공!`);
            else results.push(`조합 ${index+1}: 규칙에 맞지 않습니다.`);
        });

        alert(results.join("\n"));
    }

    // 타일 뭉치 찾기 (거리 기준)
    function findGroups() {
        const foundGroups = [];
        const visited = new Set();

        for (let i = 0; i < tiles.length; i++) {
            if (visited.has(i)) continue;
            let group = [tiles[i]];
            visited.add(i);

            for (let j = 0; j < tiles.length; j++) {
                if (visited.has(j)) continue;
                const dist = Math.hypot(tiles[i].x - tiles[j].x, tiles[i].y - tiles[j].y);
                if (dist < GRID_SIZE * 1.5) { // 근처에 있으면 같은 뭉치
                    group.push(tiles[j]);
                    visited.add(j);
                }
            }
            if (group.length >= 3) foundGroups.push(group);
        }
        return foundGroups;
    }

    // 진짜 규칙 검사 (연속인지, 같은 숫자인지)
    function validateGroup(group) {
        // 1. 같은 색상 연속 숫자 (Run)
        const sameColor = group.every(t => t.color === group[0].color);
        const nums = group.map(t => t.num).sort((a, b) => a - b);
        const isSequence = nums.every((n, i) => i === 0 || n === nums[i-1] + 1);
        if (sameColor && isSequence) return "RUN";

        // 2. 다른 색상 같은 숫자 (Group)
        const sameNum = group.every(t => t.num === group[0].num);
        const diffColors = new Set(group.map(t => t.color)).size === group.length;
        if (sameNum && diffColors) return "GROUP";

        return null;
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for (let x = 0; x < canvas.width; x += GRID_SIZE) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height - 200); ctx.stroke();
        }

        tiles.forEach(tile => {
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.roundRect(tile.x, tile.y, TILE_W, TILE_H, 6);
            ctx.fill();
            ctx.strokeStyle = (draggingTile === tile) ? "#3498db" : "#7f8c8d";
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = tile.color;
            ctx.font = "bold 26px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2);
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            draggingTile.x = Math.round(draggingTile.x / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_W) / 2;
            draggingTile.y = Math.round(draggingTile.y / GRID_SIZE) * GRID_SIZE + (GRID_SIZE - TILE_H) / 2;
        }
        draggingTile = null;
        render();
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
