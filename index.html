<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Full Compatibility</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 6px; z-index: 100; padding: 10px 0; }
        button { padding: 10px 14px; font-size: 13px; background: #2c3e50; color: white; border: 1px solid #34495e; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-complete { background: #27ae60; }
        .btn-draw { background: #8e44ad; }
        .pool-info { position: absolute; top: 10px; right: 15px; color: #f1c40f; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div id="pool-display" class="pool-info">더미: 0</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="drawInitialTiles()">리셋</button>
    <button class="btn-draw" onclick="drawOneTile()">타일 뽑기</button>
    <button onclick="sortHand()">정렬</button>
    <button class="btn-complete" onclick="submitToBoard()">조합 등록</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;

    // 타일 및 그리드 설정
    const TILE_W = 46, TILE_H = 60;
    const MARGIN = 12; // 타일 사이 최소 간격
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    
    let handLineY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // 핸드 영역을 버튼 위쪽으로 충분히 확보 (바닥에서 120px 띄움)
        handLineY = canvas.height * 0.45; 
        render();
    }
    window.addEventListener('resize', resize);

    function drawInitialTiles() {
        tiles = []; pool = [];
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 'J', color: 'color', joker: 'color' }, { num: 'J', color: 'bw', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);

        for (let i = 0; i < 14; i++) { drawOneTile(true); }
        updatePoolDisplay();
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        
        const handTiles = tiles.filter(tile => tile.y >= handLineY);
        const idx = handTiles.length;
        
        // [수정] 화면 가로폭에 따라 자동으로 줄바꿈 개수 계산
        const cols = Math.floor((canvas.width - 20) / (TILE_W + MARGIN));
        t.x = 15 + (idx % cols) * (TILE_W + MARGIN);
        t.y = handLineY + 40 + Math.floor(idx / cols) * (TILE_H + MARGIN + 10);
        
        tiles.push(t);
        if(!isInit) { updatePoolDisplay(); render(); }
    }

    function updatePoolDisplay() { document.getElementById('pool-display').innerText = `더미: ${pool.length}`; }

    function sortHand() {
        let handTiles = tiles.filter(t => t.y >= handLineY);
        let boardTiles = tiles.filter(t => t.y < handLineY);

        handTiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1;
            if (!a.joker && b.joker) return -1;
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
            return a.num - b.num;
        });

        const cols = Math.floor((canvas.width - 20) / (TILE_W + MARGIN));
        handTiles.forEach((t, i) => {
            t.x = 15 + (i % cols) * (TILE_W + MARGIN);
            t.y = handLineY + 40 + Math.floor(i / cols) * (TILE_H + MARGIN + 10);
        });

        tiles = [...boardTiles, ...handTiles];
        render();
    }

    function submitToBoard() { render(); }

    function drawHexTile(ctx, x, y, w, h, isDragging) {
        const r = 8; const d = 4;
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.roundRect(x+d, y+d, w, h, r); ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
        ctx.strokeStyle = isDragging ? "#3498db" : "#bdc3c7";
        ctx.lineWidth = isDragging ? 3 : 1;
        ctx.stroke();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 구분선
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.beginPath(); ctx.moveTo(0, handLineY); ctx.lineTo(canvas.width, handLineY); ctx.stroke();
        
        ctx.fillStyle = "#777";
        ctx.font = "bold 12px sans-serif";
        ctx.fillText("BOARD AREA", 15, handLineY - 15);
        ctx.fillText("PLAYER HAND", 15, handLineY + 25);

        tiles.forEach(tile => {
            drawHexTile(ctx, tile.x, tile.y, TILE_W, TILE_H, draggingTile === tile);
            if (tile.joker) {
                ctx.fillStyle = "#333";
                ctx.font = "bold 20px Arial";
                ctx.textAlign = "center";
                ctx.fillText("J", tile.x + TILE_W/2, tile.y + TILE_H/2 + 7);
            } else {
                ctx.fillStyle = tile.color;
                ctx.font = "bold 26px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(tile.num, tile.x + TILE_W/2, tile.y + TILE_H/2 + 2);
            }
        });
    }

    function onStart(e) {
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        // [수정] 버튼 영역 클릭 방해 방지 범위를 100px로 상향
        if (y > canvas.height - 100) return;

        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                draggingTile = t;
                offsetX = x - t.x; offsetY = y - t.y;
                tiles.push(tiles.splice(i, 1)[0]);
                render();
                break;
            }
        }
    }
    function onMove(e) {
        if (!draggingTile) return;
        const ev = e.touches ? e.touches[0] : e;
        draggingTile.x = ev.clientX - offsetX;
        draggingTile.y = ev.clientY - offsetY;
        render();
    }
    function onEnd() {
        if (draggingTile) {
            // [수정] 대각선 방지를 위해 칸에 딱 맞춰 정렬 (자석 효과)
            const snapX = TILE_W + MARGIN;
            const snapY = TILE_H + MARGIN + 10;
            draggingTile.x = Math.round((draggingTile.x - 15) / snapX) * snapX + 15;
            
            if (draggingTile.y >= handLineY) {
                draggingTile.y = Math.round((draggingTile.y - (handLineY + 40)) / snapY) * snapY + (handLineY + 40);
            } else {
                draggingTile.y = Math.round((draggingTile.y - 20) / snapY) * snapY + 20;
            }
        }
        draggingTile = null;
        render();
    }

    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', onStart, {passive: false});
    window.addEventListener('touchmove', onMove, {passive: false});
    window.addEventListener('touchend', onEnd);

    resize();
    drawInitialTiles();
</script>
</body>
</html>
