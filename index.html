<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tile Run - Professional Landscape Lock</title>
    <style>
        body { margin: 0; background: #1a1e2a; overflow: hidden; touch-action: none; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 시작 안내 레이어 (브라우저 정책상 사용자 클릭이 필요함) */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 30, 42, 0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="initGame()">
        <div style="font-size: 60px; margin-bottom: 20px;">🎮</div>
        <p style="font-size: 18px;">화면을 터치하여 게임 시작</p>
        <p style="font-size: 12px; color: #888;">(가로 모드로 자동 전환됩니다)</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = {
    rackTiles: [],
    draggingTile: null,
    savePos: { col: 0, row: 0 },
    offset: { x: 0, y: 0 },
    renderParams: {}
};

// [핵심] 가로 모드 강제 고정 함수
async function initGame() {
    const overlay = document.getElementById('start-overlay');
    
    try {
        // 1. 전체화면 요청 (가로 고정을 위해 필수인 브라우저가 많음)
        if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
        }
        
        // 2. 화면 방향 가로로 고정
        if (screen.orientation && screen.orientation.lock) {
            await screen.orientation.lock('landscape').catch(err => {
                console.log("Orientation lock failed: ", err);
            });
        }
    } catch (err) {
        console.log("Fullscreen failed: ", err);
    }

    overlay.style.display = 'none'; // 안내창 숨기기
    updateLayout();
}

function updateLayout() {
    // 이제 화면이 가로로 고정되었으므로 물리적인 폭과 높이를 그대로 사용합니다.
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const n = gameState.rackTiles.length;
    let cols = Math.max(10, n > 20 ? Math.ceil(n / 2) : 10);
    let rows = n > 10 ? 2 : 1;

    const padding = 20;
    const hGap = 4;
    const vGap = 12;

    let tileW = Math.min(55, (canvas.width - padding * 2) / cols - hGap);
    let tileH = tileW * 1.35;
    
    const rackW = cols * (tileW + hGap) + 20;
    const rackH = rows * (tileH + vGap) + 20;

    gameState.renderParams = {
        tileW, tileH, hGap, vGap, rows, cols,
        rackX: (canvas.width - rackW) / 2,
        rackY: canvas.height - rackH - 15,
        rackW, rackH,
        fontSize: Math.floor(tileH * 0.5),
        depth: tileH * 0.08
    };

    gameState.rackTiles.forEach(tile => {
        if (tile !== gameState.draggingTile) snapToGrid(tile, tile.col, tile.row);
    });
}

// --- 이후 타일 그리기 및 이벤트 로직은 이전과 동일 (좌표 보정 불필요) ---

function snapToGrid(tile, col, row) {
    const p = gameState.renderParams;
    tile.x = p.rackX + 10 + col * (p.tileW + p.hGap);
    tile.y = p.rackY + 10 + row * (p.tileH + p.vGap);
    tile.col = col; tile.row = row;
}

function draw4DTile(tile) {
    const p = gameState.renderParams;
    const { x, y, num, color } = tile;
    ctx.save();
    if (gameState.draggingTile === tile) { ctx.shadowBlur = 15; ctx.shadowOffsetY = 8; ctx.translate(-2, -2); }
    else { ctx.shadowBlur = 4; ctx.shadowOffsetY = 2; }
    ctx.shadowColor = "rgba(0,0,0,0.4)";
    ctx.fillStyle = "#cbd5e0";
    ctx.beginPath(); ctx.roundRect(x, y + p.depth, p.tileW, p.tileH, 3); ctx.fill();
    ctx.shadowBlur = 0; ctx.fillStyle = "white";
    ctx.beginPath(); ctx.roundRect(x, y, p.tileW, p.tileH, 3); ctx.fill();
    ctx.font = `bold ${p.fontSize}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = color; ctx.fillText(num, x + p.tileW/2, y + p.tileH/2 + 1);
    ctx.restore();
}

function drawRack() {
    const p = gameState.renderParams;
    ctx.save();
    const grad = ctx.createLinearGradient(p.rackX, p.rackY, p.rackX, p.rackY + p.rackH);
    grad.addColorStop(0, "#d2b48c"); grad.addColorStop(1, "#8b4513");
    ctx.fillStyle = grad;
    ctx.shadowBlur = 10; ctx.shadowColor = "black";
    ctx.beginPath(); ctx.roundRect(p.rackX, p.rackY, p.rackW, p.rackH, 8); ctx.fill();
    ctx.restore();
}

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
        x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
        y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
    };
}

canvas.addEventListener('mousedown', (e) => {
    const pos = getPos(e);
    const p = gameState.renderParams;
    for (let i = gameState.rackTiles.length - 1; i >= 0; i--) {
        const t = gameState.rackTiles[i];
        if (pos.x >= t.x && pos.x <= t.x + p.tileW && pos.y >= t.y && pos.y <= t.y + p.tileH) {
            gameState.draggingTile = t;
            gameState.savePos = { col: t.col, row: t.row };
            gameState.offset = { x: pos.x - t.x, y: pos.y - t.y };
            gameState.rackTiles.splice(i, 1);
            gameState.rackTiles.push(t);
            break;
        }
    }
});

window.addEventListener('mousemove', (e) => {
    if (!gameState.draggingTile) return;
    const pos = getPos(e);
    gameState.draggingTile.x = pos.x - gameState.offset.x;
    gameState.draggingTile.y = pos.y - gameState.offset.y;
});

window.addEventListener('mouseup', () => {
    if (!gameState.draggingTile) return;
    const t = gameState.draggingTile;
    const p = gameState.renderParams;
    const col = Math.round((t.x - (p.rackX + 10)) / (p.tileW + p.hGap));
    const row = Math.round((t.y - (p.rackY + 10)) / (p.tileH + p.vGap));
    const isOverlap = gameState.rackTiles.find(ot => ot !== t && ot.col === col && ot.row === row);
    if (col >= 0 && col < p.cols && row >= 0 && row < p.rows && !isOverlap) snapToGrid(t, col, row);
    else snapToGrid(t, gameState.savePos.col, gameState.savePos.row);
    gameState.draggingTile = null;
});

// 터치 기본 동작 방지
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, {passive: false});

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRack();
    gameState.rackTiles.forEach(draw4DTile);
    requestAnimationFrame(render);
}

// 테스트 데이터 (22개)
const colors = ['#e53e3e', '#3182ce', '#ed8936', '#2d3748'];
for(let i=0; i<22; i++) {
    gameState.rackTiles.push({
        num: (i % 13) + 1, color: colors[i % 4],
        col: i % 11, row: Math.floor(i / 11)
    });
}

window.addEventListener('resize', updateLayout);
updateLayout();
render();
</script>
</body>
</html>
