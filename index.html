<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Core Logic</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; overflow: hidden; color: white; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        button { padding: 10px 18px; font-size: 14px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; outline: none; }
        button:active { background: #2c3e50; }
        button:disabled { opacity: 0.5; cursor: default; }
        .btn-complete { background: #27ae60; }
        .btn-complete:active { background: #219150; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        #msg { margin: 5px; font-size: 14px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0;">Tile Run</h3>
    <p id="msg">게임을 시작하세요.</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="resetGame()">리셋</button>
    <button id="btnDraw" onclick="drawOneTile()" style="background:#8e44ad;">타일 뽑기</button>
    <button onclick="sortHand()">정렬</button>
    <button class="btn-complete" onclick="finishTurn()">조합 확정</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgArea = document.getElementById('msg');
    
    let tiles = [];
    let pool = [];
    let draggingTile = null;
    let offsetX, offsetY;
    
    // 게임 상태 변수
    let isFirstMove = true; // 30점 룰 적용 대상인지 여부

    // --- 설정값 (코어) ---
    const TILE_W = 46, TILE_H = 62;
    // 거치대(Rack) 그리드
    const RACK_GRID_X = 54, RACK_GRID_Y = 80;
    // 보드(Board) 그리드 (약간 더 촘촘하게)
    const BOARD_GRID_X = 50, BOARD_GRID_Y = 70;
    
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22']; // 빨, 노, 파, 주
    const RACK_ROWS = 3;
    const BOARD_TOP_MARGIN = 60; // 헤더 영역 침범 방지

    let rackY; // 거치대 시작 높이 (resize에서 계산)

    // 화면 크기 조정
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        rackY = canvas.height - (RACK_GRID_Y * RACK_ROWS) - 90; // UI 버튼 영역 확보
        render();
    }
    window.addEventListener('resize', resize);

    // --- 게임 초기화 및 타일 생성 ---
    function resetGame() {
        tiles = []; pool = []; isFirstMove = true;
        showMessage("게임을 시작합니다. 첫 등록은 30점 이상이어야 합니다.");
        
        // 106장 덱 생성 (법적 문제 없음: 표준 룰의 세트 구성)
        for (let s = 0; s < 2; s++) { // 두 세트
            colors.forEach(c => { 
                for (let n = 1; n <= 13; n++) {
                    pool.push({ num: n, color: c, joker: null, place: 'rack', originRackX: 0, originRackY: 0 }); 
                } 
            });
        }
        // 조커 2종 (색상 구별 확실히)
        pool.push({ num: 0, color: '#ff3399', joker: 'color', place: 'rack', originRackX: 0, originRackY: 0 }); // 컬러 🤡
        pool.push({ num: 0, color: '#aaaaaa', joker: 'bw', place: 'rack', originRackX: 0, originRackY: 0 });    // 흑백 🤡 (회색으로 변경하여 시인성 확보)
        
        // 셔플
        pool.sort(() => Math.random() - 0.5);
        
        // 초기 타일 14장 분배
        for (let i = 0; i < 14; i++) drawOneTile(true);
        render();
    }

    // 타일 한 장 뽑기
    function drawOneTile(isInit = false) {
        if (pool.length === 0) { showMessage("타일 풀이 비었습니다."); return; }
        
        let t = pool.pop();
        const pos = findEmptyRackSlot();
        t.x = t.originRackX = pos.x; // 거치대 원래 위치 기억
        t.y = t.originRackY = pos.y;
        t.place = 'rack';
        tiles.push(t);
        
        if(!isInit) {
            showMessage("타일을 한 장 뽑았습니다. 턴이 넘어갑니다.");
            // 원래는 여기서 턴을 강제로 마쳐야 하지만, 혼자 하는 퍼즐이므로 메시지만 표시
            render();
        }
    }

    // 거치대 빈 슬롯 계산 (겹침 방지)
    function findEmptyRackSlot() {
        const cols = Math.floor((canvas.width - 30) / RACK_GRID_X);
        for (let r = 0; r < RACK_ROWS; r++) {
            for (let c = 0; c < cols; c++) {
                let tx = 20 + c * RACK_GRID_X;
                let ty = rackY + r * RACK_GRID_Y;
                // 약간의 오차 허용하여 검색
                if (!tiles.some(t => t.place === 'rack' && Math.abs(t.x - tx) < 5 && Math.abs(t.y - ty) < 5)) {
                    return { x: tx, y: ty };
                }
            }
        }
        return { x: 20, y: rackY }; // 자리가 없으면 일단 맨 앞에 겹침 (예외처리)
    }

    // 거치대 타일 정렬
    function sortHand() {
        // 거치대에 있는 타일만 분리
        let rackTiles = tiles.filter(t => t.place === 'rack');
        
        rackTiles.sort((a, b) => {
            if (a.joker && !b.joker) return 1; // 조커는 뒤로
            if (!a.joker && b.joker) return -1;
            if (a.joker && b.joker) return (a.joker === 'color') ? -1 : 1; // 컬러조커 먼저
            
            if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color); // 색상순
            return a.num - b.num; // 숫자순
        });

        const cols = Math.floor((canvas.width - 30) / RACK_GRID_X);
        rackTiles.forEach((t, i) => {
            t.x = t.originRackX = 20 + (i % cols) * RACK_GRID_X;
            t.y = t.originRackY = rackY + Math.floor(i / cols) * RACK_GRID_Y;
        });
        render();
    }

    // --- 렌더링 코어 (UI & 디자인) ---
    function drawTileUI(ctx, t, isDrag) {
        const depth = 4, r = 7;
        
        // 1. 입체감 (그림자/두께)
        ctx.fillStyle = "#bdc3c7";
        ctx.beginPath(); ctx.roundRect(t.x + depth, t.y + depth, TILE_W, TILE_H, r); ctx.fill();
        
        // 2. 타일 앞면
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(t.x, t.y, TILE_W, TILE_H, r); ctx.fill();
        
        // 테두리 (드래그 중이거나 보드에 있을 때 강조)
        ctx.strokeStyle = isDrag ? "#3498db" : (t.place === 'board' ? "#ddd" : "#d1d8e0"); 
        ctx.lineWidth = isDrag ? 3 : 1; 
        ctx.stroke();

        // 3. 내용물 (숫자/조커) - 폰트 최적화 적용
        ctx.textAlign = "center"; 
        ctx.textBaseline = "middle"; 

        if (t.joker) {
            // [해결 1] 조커 색상 판별 로직 수정 ('bw'이면 회색)
            ctx.fillStyle = (t.joker === 'bw') ? "#555555" : "#ff3399";
            ctx.font = "bold 28px Arial"; 
            ctx.fillText("🤡", t.x + TILE_W/2, t.y + TILE_H/2 + 2); // 미세 조정
        } else {
            ctx.fillStyle = t.color;
            // 가변 글꼴 (두 자릿수 약간 작게)
            const fontSize = (t.num > 9) ? "24px" : "28px"; 
            ctx.font = `bold ${fontSize} 'Arial Rounded MT Bold', Helvetica, sans-serif`;
            
            // 시각적 중앙 오프셋 조정
            const yOffset = (t.num < 10) ? 2 : 1;
            ctx.fillText(t.num, t.x + TILE_W/2, t.y + TILE_H/2 + yOffset);
        }
    }

    function render() {
        // 배경 청소
        ctx.fillStyle = "#1a1e2a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // --- 보드 영역 표시 (가이드라인) ---
        ctx.strokeStyle = "rgba(255,255,255,0.03)";
        ctx.lineWidth = 1;
        // 가로선
        for(let y = BOARD_TOP_MARGIN; y < rackY - 20; y += BOARD_GRID_Y) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
        // 세로선
        for(let x = 10; x < canvas.width; x += BOARD_GRID_X) {
            ctx.beginPath(); ctx.moveTo(x, BOARD_TOP_MARGIN); ctx.lineTo(x, rackY - 20); ctx.stroke();
        }

        // --- 3단 개인 거치대(Rack) 디자인 ---
        ctx.fillStyle = "rgba(0,0,0,0.2)"; // 배경보다 약간 어둡게
        ctx.shadowColor = "rgba(0,0,0,0.3)"; ctx.shadowBlur = 15;
        for(let i=0; i<RACK_ROWS; i++) {
            ctx.beginPath();
            ctx.roundRect(10, rackY + (i * RACK_GRID_Y) - 5, canvas.width - 20, TILE_H + 10, 10);
            ctx.fill();
        }
        ctx.shadowBlur = 0; // 그림자 초기화

        // --- 타일 그리기 (드래그 중인 타일은 맨 나중에 그려서 위로 올림) ---
        tiles.filter(t => t !== draggingTile).forEach(tile => drawTileUI(ctx, tile, false));
        if(draggingTile) drawTileUI(ctx, draggingTile, true);
    }

    // --- 마우스/터치 이벤트 로직 (인터랙션) ---
    function getEventPos(e) {
        const ev = e.touches ? e.touches[0] : e;
        return { x: ev.clientX, y: ev.clientY };
    }

    function onStart(e) {
        e.preventDefault(); // 스크롤 방지 등
        const pos = getEventPos(e);
        
        // 맨 위에 있는 타일부터 잡히도록 역순 탐색
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (pos.x >= t.x && pos.x <= t.x + TILE_W && pos.y >= t.y && pos.y <= t.y + TILE_H) {
                draggingTile = t; 
                offsetX = pos.x - t.x; 
                offsetY = pos.y - t.y;
                
                // 거치대에서 잡은 경우, 원래 위치 기억 (회수용)
                if(t.place === 'rack') {
                    t.originRackX = t.x;
                    t.originRackY = t.y;
                }

                // 잡은 타일을 배열 맨 뒤로 보냄 (맨 앞에 그리려고)
                tiles.push(tiles.splice(i, 1)[0]); 
                render(); 
                break;
            }
        }
    }

    function onMove(e) { 
        if (!draggingTile) return; 
        const pos = getEventPos(e);
        draggingTile.x = pos.x - offsetX; 
        draggingTile.y = pos.y - offsetY; 
        render(); 
    }

    function onEnd(e) {
        if (!draggingTile) return;

        // [핵심 2 해결] 보드 vs 거치대 판정 및 스냅 로직
        
        if (draggingTile.y < rackY - 20) {
            // --- 상단 보드 영역에 드롭 ---
            let targetX = Math.round((draggingTile.x - 10) / BOARD_GRID_X) * BOARD_GRID_X + 10;
            let targetY = Math.round((draggingTile.y - BOARD_TOP_MARGIN) / BOARD_GRID_Y) * BOARD_GRID_Y + BOARD_TOP_MARGIN;
            
            // 보드 상단 한계 준수
            if(targetY < BOARD_TOP_MARGIN) targetY = BOARD_TOP_MARGIN;

            // 겹침 검사 (보드 위)
            const isOccupied = tiles.some(t => t !== draggingTile && t.place === 'board' && Math.abs(t.x - targetX) < 10 && Math.abs(t.y - targetY) < 10);
            
            if(isOccupied) {
                // 자리가 있으면 원래 있던 곳으로 복귀 (거치대에서 왔으면 거치대로, 보드에서 움직였으면 움직이기 전 보드 위치로)
                // 지금은 14단계이므로 단순 회수 처리
                returnToOrigin(draggingTile);
            } else {
                // 보드에 안착
                draggingTile.x = targetX;
                draggingTile.y = targetY;
                draggingTile.place = 'board';
            }
        } else {
            // --- 하단 거치대 영역에 드롭 ---
            let row = Math.round((draggingTile.y - rackY) / RACK_GRID_Y);
            row = Math.max(0, Math.min(row, RACK_ROWS - 1)); // row 범위 제한
            let targetX = Math.round((draggingTile.x - 20) / RACK_GRID_X) * RACK_GRID_X + 20;
            let targetY = rackY + row * RACK_GRID_Y;

            // 겹침 검사 (거치대 위)
            const existingTile = tiles.find(t => t !== draggingTile && t.place === 'rack' && Math.abs(t.x - targetX) < 10 && Math.abs(t.y - targetY) < 10);
            
            if (existingTile) {
                // 간단한 겹침 처리: 원래 자리로 복귀
                returnToOrigin(draggingTile);
            } else {
                // 거치대에 안착 (새로운 원래 자리 저장)
                draggingTile.x = draggingTile.originRackX = targetX;
                draggingTile.y = draggingTile.originRackY = targetY;
                draggingTile.place = 'rack';
            }
        }

        draggingTile = null; 
        render();
    }

    // 타일을 거치대의 원래 자리로 되돌리는 함수
    function returnToOrigin(t) {
        t.x = t.originRackX;
        t.y = t.originRackY;
        t.place = 'rack';
    }

    function showMessage(msg) {
        msgArea.innerText = msg;
    }

    // --- 조합 검증 및 턴 종료 로직 (퍼즐 코어) ---
    
    // 법적 문제가 없도록 정식 규칙의 논리구조만 구현합니다.
    function finishTurn() {
        const boardTiles = tiles.filter(t => t.place === 'board');
        
        if(boardTiles.length === 0) {
            showMessage("보드에 낸 타일이 없습니다. 타일 뽑기를 눌러 턴을 마치세요.");
            return;
        }

        // 1. 가로 정렬 및 그룹화 (연속된 타일 뭉치 찾기)
        const groups = checkAndGetGroups(boardTiles);
        
        if(!groups) {
            // 검증 실패: 타일이 떨어져 있거나 3장 미만
            failTurn("모든 타일은 가로로 3장 이상 붙어있어야 합니다.");
            return;
        }

        // 2. 각 그룹의 유효성 (Run/Group) 및 점수 계산
        let totalScore = 0;
        let allValid = true;

        groups.forEach(group => {
            const result = validateSet(group);
            if(result.valid) {
                totalScore += result.score;
            } else {
                allValid = false;
            }
        });

        if(!allValid) {
            failTurn("유효하지 않은 조합(숫자/색상 규칙 불일치)이 있습니다.");
            return;
        }

        // 3. 30점 룰 적용 (첫 등록)
        if (isFirstMove) {
            if (totalScore < 30) {
                failTurn(`첫 등록 점수가 부족합니다. (현재: ${totalScore}점 / 필요: 30점)`);
                return;
            } else {
                isFirstMove = false;
                showMessage(`등록 성공! (총 ${totalScore}점). 이제 자유롭게 재조합이 가능합니다.`);
            }
        } else {
            showMessage(`조합 확정 완료! (총 ${totalScore}점)`);
        }

        // 성공 시: 보드 위 타일들의 originRackX/Y를 현재 위치로 갱신 (이제 회수 안 됨)
        // (퍼즐 모드이므로 실제 갱신 로직은 15단계 재조합에서 상세 구현)
        render();
    }

    // 검증 실패 시 전체 회수 로직
    function failTurn(reason) {
        showMessage("❌ " + reason + " 타일이 회수됩니다.");
        // 애니메이션 없이 즉시 회수
        tiles.forEach(t => {
            if(t.place === 'board') {
                returnToOrigin(t);
            }
        });
        setTimeout(() => render(), 500); // 메시지 볼 시간 후 렌더링
    }

    // [로직] 보드 위 타일들을 가로 뭉치로 나눔
    function checkAndGetGroups(boardTiles) {
        // Y축 -> X축 순서로 정렬
        boardTiles.sort((a, b) => (a.y === b.y) ? a.x - b.x : a.y - b.y);
        
        let groups = [];
        let currentGroup = [];

        for (let i = 0; i < boardTiles.length; i++) {
            const t = boardTiles[i];
            if (currentGroup.length === 0) {
                currentGroup.push(t);
            } else {
                const last = currentGroup[currentGroup.length - 1];
                // 같은 줄(Y)이고, 바로 옆 그리드(X)에 붙어있는가?
                if (t.y === last.y && t.x === last.x + BOARD_GRID_X) {
                    currentGroup.push(t);
                } else {
                    // 끊겼으면 지금까지 뭉치 저장, 새 뭉치 시작
                    if(currentGroup.length < 3) return null; // 3장 미만 탈락
                    groups.push(currentGroup);
                    currentGroup = [t];
                }
            }
        }
        if(currentGroup.length > 0) {
            if(currentGroup.length < 3) return null;
            groups.push(currentGroup);
        }
        
        return groups.length > 0 ? groups : null;
    }

    // [로직] 하나의 세트(3장 이상)가 Run인지 Group인지 검증
    function validateSet(group) {
        // 조커 처리 논리는 복잡하므로 15단계에서 강화.
        // 여기서는 기초적인 숫자/색상 논리만 법적 문제없게 구현.
        
        // 조커를 제외한 타일들
        const realTiles = group.filter(t => !t.joker);
        if(realTiles.length === 0) return {valid: true, score: 30}; // 조커로만 된 세트 (거의 없지만 인정)

        const isSameColor = realTiles.every(t => t.color === realTiles[0].color);
        const isSameNum = realTiles.every(t => t.num === realTiles[0].num);

        let sum = 0;
        // 조커 점수 계산용 (조커는 대체하는 타일의 점수를 가짐)
        // 기초 구현: Run이면 앞뒤 문맥 봐야하나, 여기선 단순히 group 내 평균점수 처리 (임시)
        let tempSum = 0; realTiles.forEach(t=>tempSum+=t.num);
        let avgScore = Math.round(tempSum / realTiles.length);

        group.forEach(t => sum += t.joker ? avgScore : t.num);

        if (isSameColor) {
            // potential RUN (같은 색, 연속된 숫자)
            // 숫자 정렬 후 연속 검사
            realTiles.sort((a,b)=>a.num - b.num);
            for(let i=0; i<realTiles.length-1; i++) {
                // 조커가 껴있을 자리를 고려한 연속성 검사 필요 (15단계 상세구현)
                // 현재는 조커 미고려 기초 검증
                if(group.length === realTiles.length && realTiles[i+1].num !== realTiles[i].num + 1) return {valid: false};
            }
            return {valid: true, score: sum};

        } else if (isSameNum) {
            // potential GROUP (같은 숫자, 다른 색상)
            // 색상 중복 검사
            const seenColors = new Set();
            for(let t of realTiles) {
                if(seenColors.has(t.color)) return {valid: false}; // 같은 색 중복
                seenColors.add(t.color);
            }
            if(group.length > 4) return {valid: false}; // 그룹은 최대 4장
            return {valid: true, score: sum};
        }

        return {valid: false}; // 둘 다 아님
    }


    // --- 이벤트 리스너 등록 ---
    const est = { passive: false }; // touch event option
    canvas.addEventListener('mousedown', onStart); 
    window.addEventListener('mousemove', onMove); 
    window.addEventListener('mouseup', onEnd);
    
    canvas.addEventListener('touchstart', onStart, est);
    window.addEventListener('touchmove', onMove, est);
    window.addEventListener('touchend', onEnd);
    
    // 초기화
    resize(); 
    resetGame();

</script>
</body>
</html>
