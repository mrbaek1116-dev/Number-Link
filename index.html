<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Phase 1</title>
    <style>
        /* 모바일 최적화: 스크롤 및 선택 방지 */
        body { margin: 0; padding: 0; background: #1a1e2a; overflow: hidden; touch-action: none; user-select: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 1. 반응형 설정: 화면 크기가 변해도 꽉 차게
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    draw(); // 크기 변할 때마다 다시 그리기
}

// 2. 타일 그리기 함수 (전문가 수준의 디테일)
function drawTile(x, y, num, color) {
    const w = 45;
    const h = 60;
    const radius = 6;

    ctx.save();
    // 타일 그림자
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    ctx.shadowColor = "rgba(0,0,0,0.3)";

    // 타일 몸체
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, radius);
    ctx.fill();

    // 테두리
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#cbd5e0";
    ctx.lineWidth = 1;
    ctx.stroke();

    // 숫자 텍스트
    ctx.fillStyle = color;
    ctx.font = "bold 24px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(num, x + w / 2, y + h / 2 + 2);
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 테스트용 타일 몇 개
    drawTile(50, 50, "7", "#e53e3e");  // 빨강
    drawTile(105, 50, "8", "#ed8936"); // 주황
    drawTile(160, 50, "9", "#3182ce"); // 파랑
}

window.addEventListener('resize', resize);
resize(); // 초기 실행
</script>
</body>
</html>
