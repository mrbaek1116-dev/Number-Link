<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tile Run - Sorting Pro</title>
    <style>
        body { margin: 0; background: #1a1e2a; touch-action: none; font-family: 'Pretendard', sans-serif; overflow: hidden; color: white; }
        canvas { display: block; }
        .ui-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; flex-wrap: wrap; }
        button { padding: 10px 15px; font-size: 13px; background: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        .btn-complete { background: #27ae60; border: 2px solid #fff; }
        .btn-sort { background: #2980b9; }
        .header { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #msg { margin: 5px; font-size: 15px; color: #ffeb3b; text-shadow: 0 1px 3px rgba(0,0,0,0.8); font-weight: bold; }
        #victory-overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 200; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        #victory-overlay h1 { color: #f1c40f; font-size: 3rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="victory-overlay">
    <h1>🎉 RUMIKUB! 🎉</h1>
    <p>모든 타일을 내려놓았습니다!</p>
    <button onclick="location.reload()" style="background:#e74c3c; margin-top:20px; font-size:18px;">새 게임 시작</button>
</div>

<div class="header">
    <h3 style="margin:0; letter-spacing: 2px;">LUMICUBE PUZZLE</h3>
    <p id="msg">정렬 버튼을 눌러 전략을 세우세요!</p>
</div>

<canvas id="gameCanvas"></canvas>

<div class="ui-bottom">
    <button onclick="resetGame()">리셋</button>
    <button onclick="drawOneTile()" style="background:#8e44ad;">타일 뽑기</button>
    <button class="btn-sort" onclick="sortHand('color')">색상 정렬</button>
    <button class="btn-sort" onclick="sortHand('number')">숫자 정렬</button>
    <button class="btn-complete" onclick="finishTurn()">조합 확정</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgArea = document.getElementById('msg');
    const victoryOverlay = document.getElementById('victory-overlay');
    
    let tiles = [];
    let pool = [];
    let draggingGroup = []; 
    let startX, startY;
    let hasRegistered30 = false;
    let gameActive = true;

    const TILE_W = 46, TILE_H = 62;
    const RACK_GRID_X = 54, RACK_GRID_Y = 80;
    const BOARD_GRID_X = 50, BOARD_GRID_Y = 70;
    const colors = ['#e74c3c', '#f1c40f', '#3498db', '#e67e22'];
    const RACK_ROWS = 3;
    const BOARD_TOP = 80;
    let rackY;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        rackY = canvas.height - (RACK_GRID_Y * RACK_ROWS) - 40;
        render();
    }
    window.addEventListener('resize', resize);

    function resetGame() {
        tiles = []; pool = []; hasRegistered30 = false; gameActive = true;
        victoryOverlay.style.display = "none";
        for (let s = 0; s < 2; s++) {
            colors.forEach(c => { for (let n = 1; n <= 13; n++) pool.push({ num: n, color: c, joker: null }); });
        }
        pool.push({ num: 0, color: '#ff3399', joker: 'color' });
        pool.push({ num: 0, color: '#555555', joker: 'bw' });
        pool.sort(() => Math.random() - 0.5);
        for (let i = 0; i < 14; i++) drawOneTile(true);
        render();
    }

    function drawOneTile(isInit = false) {
        if (pool.length === 0) return;
        let t = pool.pop();
        const pos = findEmptyRackSlot();
        t.x = t.saveX = pos.x; t.y = t.saveY = pos.y;
        t.place = 'rack';
        tiles.push(t);
        if(!isInit) { showMessage("타일을 뽑았습니다."); render(); }
    }

    function findEmptyRackSlot() {
        const cols = Math.floor((canvas.width - 40) / RACK_GRID_X);
        for (let r = 0; r < RACK_ROWS; r++) {
            for (let c = 0; c < cols; c++) {
                let tx = 20 + c * RACK_GRID_X;
                let ty = rackY + r * RACK_GRID_Y;
                if (!isOccupied(tx, ty)) return { x: tx, y: ty };
            }
        }
        return { x: 20, y: rackY };
    }

    function isOccupied(x, y, ignoreList = []) {
        return tiles.some(t => !ignoreList.includes(t) && Math.abs(t.x - x) < 20 && Math.abs(t.y - y) < 20);
    }

    // --- 정렬 로직 고도화 ---
    function sortHand(type) {
        let rackTiles = tiles.filter(t => t.place === 'rack');
        
        if (type === 'color') {
            // 색상별 정렬: 색상 인덱스 우선 -> 그 다음 숫자 순
            rackTiles.sort((a, b) => {
                if (a.joker) return 1; if (b.joker) return -1; // 조커는 맨 뒤로
                if (a.color !== b.color) return colors.indexOf(a.color) - colors.indexOf(b.color);
                return a.num - b.num;
            });
            showMessage("색상별로 정렬했습니다.");
        } else {
            // 숫자별 정렬: 숫자 우선 -> 그 다음 색상 순
            rackTiles.sort((a, b) => {
                if (a.joker) return 1; if (b.joker) return -1;
                if (a.num !== b.num) return a.num - b.num;
                return colors.indexOf(a.color) - colors.indexOf(b.color);
            });
            showMessage("숫자별로 정렬했습니다.");
        }

        const cols = Math.floor((canvas.width - 40) / RACK_GRID_X);
        rackTiles.forEach((t, i) => {
            t.x = t.saveX = 20 + (i % cols) * RACK_GRID_X;
            t.y = t.saveY = rackY + Math.floor(i / cols) * RACK_GRID_Y;
        });
        render();
    }

    function drawTileUI(ctx, t, isDrag) {
        const depth = 4, r = 6;
        ctx.fillStyle = "#bdc3c7";
        ctx.beginPath(); ctx.roundRect(t.x + depth, t.y + depth, TILE_W, TILE_H, r); ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.roundRect(t.x, t.y, TILE_W, TILE_H, r); ctx.fill();
        ctx.strokeStyle = isDrag ? "#3498db" : "#d1d8e0";
        ctx.lineWidth = isDrag ? 3 : 1.5; ctx.stroke();
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillStyle = t.color;
        if (t.joker) {
            ctx.font = "28px Arial";
            ctx.fillText("🤡", t.x + TILE_W/2, t.y + TILE_H/2 + 2);
        } else {
            ctx.font = `bold ${t.num > 9 ? "22px" : "26px"} sans-serif`;
            ctx.fillText(t.num, t.x + TILE_W/2, t.y + TILE_H/2 + 2);
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.roundRect(10, BOARD_TOP - 10, canvas.width - 20, rackY - BOARD_TOP, 15); ctx.fill();
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        for(let i=0; i<RACK_ROWS; i++) {
            ctx.beginPath(); ctx.roundRect(10, rackY + (i * RACK_GRID_Y) - 5, canvas.width - 20, TILE_H + 10, 8); ctx.fill();
        }
        tiles.filter(t => !draggingGroup.includes(t)).forEach(tile => drawTileUI(ctx, tile, false));
        draggingGroup.forEach(tile => drawTileUI(ctx, tile, true));
    }

    function getConnectedTiles(startTile, clickX) {
        if (startTile.place === 'rack') return [startTile];
        const relativeX = clickX - startTile.x;
        const isCenterClick = (relativeX > TILE_W * 0.3 && relativeX < TILE_W * 0.7);
        if (isCenterClick) return [startTile];

        let connected = [startTile];
        let queue = [startTile];
        while(queue.length > 0) {
            let curr = queue.shift();
            tiles.forEach(t => {
                if (t.place === 'board' && !connected.includes(t)) {
                    if (Math.abs(t.y - curr.y) < 10 && Math.abs(Math.abs(t.x - curr.x) - BOARD_GRID_X) < 10) {
                        connected.push(t); queue.push(t);
                    }
                }
            });
        }
        return connected;
    }

    function onStart(e) {
        if(!gameActive) return;
        const ev = e.touches ? e.touches[0] : e;
        const x = ev.clientX, y = ev.clientY;
        for (let i = tiles.length - 1; i >= 0; i--) {
            const t = tiles[i];
            if (x >= t.x && x <= t.x + TILE_W && y >= t.y && y <= t.y + TILE_H) {
                startX = x; startY = y;
                draggingGroup = getConnectedTiles(t, x);
                draggingGroup.forEach(dt => {
                    const idx = tiles.indexOf(dt);
                    tiles.push(tiles.splice(idx, 1)[0]);
                    dt.initX = dt.x; dt.initY = dt.y;
                });
                render(); break;
            }
        }
    }

    function onMove(e) {
        if (draggingGroup.length === 0) return;
        const ev = e.touches ? e.touches[0] : e;
        const dx = ev.clientX - startX;
        const dy = ev.clientY - startY;
        draggingGroup.forEach(t => { t.x = t.initX + dx; t.y = t.initY + dy; });
        render();
    }

    function onEnd() {
        if (draggingGroup.length === 0) return;
        let canPlace = true;
        let snapPositions = [];
        for (let t of draggingGroup) {
            let tx, ty, place;
            if (t.y < rackY - 20) {
                tx = Math.round((t.x - 10) / BOARD_GRID_X) * BOARD_GRID_X + 10;
                ty = Math.round((t.y - BOARD_TOP) / BOARD_GRID_Y) * BOARD_GRID_Y + BOARD_TOP;
                ty = Math.max(BOARD_TOP, ty);
                place = 'board';
            } else {
                let row = Math.max(0, Math.min(Math.round((t.y - rackY) / RACK_GRID_Y), RACK_ROWS-1));
                tx = Math.round((t.x - 20) / RACK_GRID_X) * RACK_GRID_X + 20;
                ty = rackY + row * RACK_GRID_Y;
                place = 'rack';
            }
            if (isOccupied(tx, ty, draggingGroup)) { canPlace = false; break; }
            snapPositions.push({ x: tx, y: ty, place: place });
        }
        draggingGroup.forEach((t, i) => {
            if (canPlace) {
                t.x = snapPositions[i].x; t.y = snapPositions[i].y; t.place = snapPositions[i].place;
            } else {
                t.x = t.saveX; t.y = t.saveY;
            }
        });
        draggingGroup = []; render();
    }

    function finishTurn() {
        const boardTiles = tiles.filter(t => t.place === 'board');
        const rackTiles = tiles.filter(t => t.place === 'rack');

        if (boardTiles.length === 0) { showMessage("보드에 타일이 없습니다."); return; }
        const groups = getGroups(boardTiles);
        if (!groups) { failTurn("모든 타일은 3장 이상 붙어야 합니다."); return; }

        let turnScore = 0, allOk = true;
        for (let g of groups) {
            const res = validate(g);
            if (!res.ok) { allOk = false; break; }
            turnScore += res.score;
        }

        if (!allOk) { failTurn("잘못된 조합입니다."); return; }

        if (!hasRegistered30) {
            if (turnScore < 30) { failTurn(`첫 등록 30점 미달 (${turnScore}점)`); return; }
            hasRegistered30 = true;
        }

        boardTiles.forEach(t => { t.saveX = t.x; t.saveY = t.y; });
        
        if (rackTiles.length === 0) {
            gameActive = false;
            victoryOverlay.style.display = "flex";
        } else {
            showMessage("✅ 확정 성공! 남은 타일: " + rackTiles.length);
            render();
        }
    }

    function failTurn(reason) {
        showMessage("❌ " + reason);
        tiles.forEach(t => { t.x = t.saveX; t.y = t.saveY; if(t.y >= rackY - 20) t.place = 'rack'; });
        setTimeout(render, 500);
    }

    function getGroups(boardTiles) {
        boardTiles.sort((a, b) => a.y === b.y ? a.x - b.x : a.y - b.y);
        let groups = [], cur = [];
        for (let i = 0; i < boardTiles.length; i++) {
            let t = boardTiles[i];
            if (cur.length > 0) {
                let last = cur[cur.length-1];
                if (t.y !== last.y || t.x !== last.x + BOARD_GRID_X) {
                    if (cur.length < 3) return null;
                    groups.push(cur); cur = [];
                }
            }
            cur.push(t);
        }
        if (cur.length > 0) { if (cur.length < 3) return null; groups.push(cur); }
        return groups;
    }

    function validate(group) {
        group.sort((a, b) => a.x - b.x);
        const reals = group.filter(t => !t.joker);
        if (reals.length === 0) return { ok: true, score: 30 };
        const isSameColor = reals.every(t => t.color === reals[0].color);
        const isSameNum = reals.every(t => t.num === reals[0].num);
        if (isSameColor) {
            let tempNums = [];
            let firstRealIdx = group.findIndex(t => !t.joker);
            let startNum = group[firstRealIdx].num - firstRealIdx;
            for(let i=0; i<group.length; i++) {
                let expected = startNum + i;
                if (expected < 1 || expected > 13) return { ok: false };
                if (!group[i].joker && group[i].num !== expected) return { ok: false };
                tempNums.push(expected);
            }
            if(new Set(tempNums).size !== tempNums.length) return { ok: false };
            return { ok: true, score: tempNums.reduce((a,b) => a+b, 0) };
        }
        if (isSameNum) {
            if (group.length > 4) return { ok: false };
            const usedColors = new Set();
            for (let t of reals) { if (usedColors.has(t.color)) return { ok: false }; usedColors.add(t.color); }
            return { ok: true, score: reals[0].num * group.length };
        }
        return { ok: false };
    }

    function showMessage(m) { msgArea.innerText = m; }
    canvas.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onStart(e); }, {passive: false});
    window.addEventListener('touchmove', (e) => { e.preventDefault(); onMove(e); }, {passive: false});
    window.addEventListener('touchend', onEnd);
    resize(); resetGame();
</script>
</body>
</html>
